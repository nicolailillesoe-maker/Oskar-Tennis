// ============ ENGINE-START ============
// Beregner hele tennis-stillingen ud fra point-sekvensen.
// pts: [{r:"V"|"T", ГҘ, f}] В· oskarFirst: Oskar server fГёrst В· mtb: 3. sГҰt = match-tiebreak til 10
function beregnStilling(pts, oskarFirst, mtb, justeringer) {
  if (!Array.isArray(pts)) pts = [];
  if (typeof oskarFirst !== "boolean") oskarFirst = true;
  const jmap = {};
  if (Array.isArray(justeringer)) for (const j of justeringer) { if (j && typeof j.i === "number") jmap[j.i] = j; }
  let setsO = 0, setsM = 0, gO = 0, gM = 0, pO = 0, pM = 0;
  const hist = [];
  let tb = false, tbTo = 7, tbFirst = null, server = oskarFirst;
  let done = false, vinderOskar = null;
  const flags = [];

  const anvendBasis = (b) => {
    setsO = Math.max(0, Math.min(1, b.sO | 0)); setsM = Math.max(0, Math.min(1, b.sM | 0));
    gO = Math.max(0, Math.min(6, b.gO | 0)); gM = Math.max(0, Math.min(6, b.gM | 0));
    pO = 0; pM = 0; server = b.server !== false;
    done = false; vinderOskar = null; tb = false; tbFirst = null; tbTo = 7;
    if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; gO = 0; gM = 0; }
    else if (gO === 6 && gM === 6) { tb = true; tbFirst = server; }
  };

  const tbServer = (first, idx) => (Math.floor((idx + 1) / 2) % 2 === 0 ? first : !first);

  for (let _i = 0; _i < pts.length; _i++) {
    const p = pts[_i];
    if (jmap[_i]) anvendBasis(jmap[_i]);
    if (done) { flags.push({ server, ekstra: true, saet: setsO + setsM + 1 }); continue; }
    const srvNu = tb ? tbServer(tbFirst, pO + pM) : server;

    // Stort-point-analyse FГҳR bolden spilles
    let stor = null;
    if (tb) {
      const sГҰtEllerMatch = tbTo === 10 || (setsO === 1 && tbTo === 7) || (setsM === 1 && tbTo === 7);
      if (pO >= tbTo - 1 && pO >= pM + 1) stor = (tbTo === 10 || setsO === 1) ? "MATCHBOLD Oskar" : "SГҶTBOLD Oskar";
      else if (pM >= tbTo - 1 && pM >= pO + 1) stor = (tbTo === 10 || setsM === 1) ? "MATCHBOLD mod Oskar" : "SГҶTBOLD mod Oskar";
      else if (pO === pM && pO >= tbTo - 2) stor = "STORT POINT";
      void sГҰtEllerMatch;
    } else {
      const gpO = pO >= 3 && pO >= pM + 1, gpM = pM >= 3 && pM >= pO + 1;
      if (gpO) {
        const vinderSГҰt = gO + 1 >= 6 && gO + 1 - gM >= 2;
        stor = vinderSГҰt && setsO === 1 ? "MATCHBOLD Oskar" : vinderSГҰt ? "SГҶTBOLD Oskar" : srvNu ? "PARTIBOLD Oskar" : "BREAKBOLD Oskar";
      } else if (gpM) {
        const vinderSГҰt = gM + 1 >= 6 && gM + 1 - gO >= 2;
        stor = vinderSГҰt && setsM === 1 ? "MATCHBOLD mod Oskar" : vinderSГҰt ? "SГҶTBOLD mod Oskar" : !srvNu ? "PARTIBOLD modst." : "BREAKBOLD mod Oskar";
      } else if (pO === pM && pO >= 2) stor = "STORT POINT (deuce/30-30)";
    }
    flags.push({ server: srvNu, stor, tb, saet: setsO + setsM + 1 });

    // Spil bolden
    if (p.r === "V") pO++; else pM++;

    if (tb) {
      if ((pO >= tbTo || pM >= tbTo) && Math.abs(pO - pM) >= 2) {
        const oVandtTB = pO > pM;
        if (tbTo === 10) { // match-tiebreak = hele 3. sГҰt
          hist.push([oVandtTB ? 1 : 0, oVandtTB ? 0 : 1, `MTB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        } else {
          if (oVandtTB) gO++; else gM++;
          hist.push([gO, gM, `TB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        }
        gO = 0; gM = 0; pO = 0; pM = 0;
        server = !tbFirst; // modtageren i tiebreaken server fГёrst i nГҰste sГҰt
        tb = false; tbFirst = null; tbTo = 7;
        if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
        else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
      }
    } else {
      const partiVundet = (pO >= 4 || pM >= 4) && Math.abs(pO - pM) >= 2;
      if (partiVundet) {
        if (pO > pM) gO++; else gM++;
        pO = 0; pM = 0; server = !server;
        if (gO >= 6 && gO - gM >= 2 || gM >= 6 && gM - gO >= 2) {
          hist.push([gO, gM, null]);
          if (gO > gM) setsO++; else setsM++;
          gO = 0; gM = 0;
          if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
          else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
        } else if (gO === 6 && gM === 6) { tb = true; tbTo = 7; tbFirst = server; }
      }
    }
  }
  if (jmap[pts.length]) anvendBasis(jmap[pts.length]);
  const nextServer = tb ? tbServer(tbFirst, pO + pM) : server;
  return { setsO, setsM, hist, gO, gM, pO, pM, tb, tbTo, server: nextServer, done, vinderOskar, flags };
}

// ---------- Statistik ----------
function statistik(k) {
  const st = beregnStilling(k.point, k.oskarFirst, k.mtb, k.justeringer);
  const F = st.flags;
  const v = k.point.filter(p => p.r === "V").length;
  const t = k.point.length - v;
  const uf = k.point.filter(p => p.r === "T" && (p.ГҘ === "uf" || p.ГҘ === "dobbelt")).length;
  const vindere = k.point.filter(p => p.r === "V" && (p.ГҘ === "vinder" || p.ГҘ === "es")).length;
  const idxServe = k.point.map((p,i)=>i).filter(i => F[i] && F[i].server === true);
  const oServe = idxServe.map(i => k.point[i]);
  const retur = k.point.filter((p,i) => F[i] && F[i].server === false);
  const oServe1 = oServe.filter(p => p.f === 1);
  const oServe2 = oServe.filter(p => p.f === 2);
  const bpFor = k.point.filter((p,i) => F[i] && F[i].stor && F[i].stor.indexOf("BREAKBOLD Oskar") === 0);
  const bpMod = k.point.filter((p,i) => F[i] && F[i].stor && F[i].stor.indexOf("BREAKBOLD mod") === 0);
  const perSaet = [];
  k.point.forEach((p, i) => {
    const sn = (F[i] && F[i].saet) || 1;
    while (perSaet.length < sn) perSaet.push({ v: 0, t: 0, uf: 0, vin: 0, s1: 0, sp: 0, s1v: 0, s2: 0, s2v: 0, df: 0 });
    const ps = perSaet[sn - 1];
    if (p.r === "V") ps.v += 1; else ps.t += 1;
    if (p.r === "T" && (p.ГҘ === "uf" || p.ГҘ === "dobbelt")) ps.uf += 1;
    if (p.r === "V" && (p.ГҘ === "vinder" || p.ГҘ === "es")) ps.vin += 1;
    if (p.ГҘ === "dobbelt") ps.df += 1;
    if (F[i] && F[i].server === true) {
      ps.sp += 1;
      if (p.f === 1) { ps.s1 += 1; if (p.r === "V") ps.s1v += 1; }
      else { ps.s2 += 1; if (p.r === "V") ps.s2v += 1; }
    }
  });
  const dl = (n) => { const q = k.point.filter(p => p.l === n); return [q.filter(p => p.r === "V").length, q.length]; };
  const budIVbrud = k.point.filter(p => p.l === 1 && p.r === "T" && (p.ГҘ === "uf" || p.ГҘ === "dobbelt")).length;
  return { st, v, t, uf, vindere, perSaet, dK: dl(1), dM: dl(2), dL: dl(3), budIVbrud,
    serve: [oServe.filter(p=>p.r==="V").length, oServe.length],
    retur: [retur.filter(p=>p.r==="V").length, retur.length],
    s1pct: oServe.length ? Math.round(oServe1.length / oServe.length * 100) : 0,
    s1: [oServe1.filter(p=>p.r==="V").length, oServe1.length],
    s2: [oServe2.filter(p=>p.r==="V").length, oServe2.length],
    df: k.point.filter(p => p.r === "T" && p.ГҘ === "dobbelt").length,
    bpFor: [bpFor.filter(p=>p.r==="V").length, bpFor.length],
    bpMod: [bpMod.filter(p=>p.r==="V").length, bpMod.length] };
}

function lavEksport(k) {
  const s = statistik(k);
  return [
    "KAMP: Oskar vs " + k.modstander + " В· " + k.turnering + " В· " + k.dato + " В· resultat: " + (k.resultat || "?"),
    "Point: " + s.v + "-" + s.t + " (" + k.point.length + " bolde) В· SГҰt: " + s.st.hist.map(h => h[2] ? h[0]+"-"+h[1]+" ("+h[2]+")" : h[0]+"-"+h[1]).join(", "),
    "Oskars serv: " + s.serve[0] + "/" + s.serve[1] + " В· 1. serv i spil: " + s.s1pct + " % В· vundet pГҘ 1. serv: " + s.s1[0] + "/" + s.s1[1] + " В· pГҘ 2. serv: " + s.s2[0] + "/" + s.s2[1] + " В· dobbeltfejl: " + s.df,
    "Retur: " + s.retur[0] + "/" + s.retur[1] + " В· Breakbolde udnyttet: " + s.bpFor[0] + "/" + s.bpFor[1] + " В· afvГҰrget: " + s.bpMod[0] + "/" + s.bpMod[1],
    "Vindere+es: " + s.vindere + " В· Gratis fejl (inkl. df): " + s.uf,
    "Pr. sГҰt: " + s.perSaet.map((ps, si) => "S" + (si + 1) + " " + ps.v + "-" + ps.t + " (UE " + ps.uf + ", vindere " + ps.vin + (ps.sp ? ", 1.serv " + Math.round(ps.s1 / ps.sp * 100) + " %" : "") + ")").join(" В· "),
    "Dueller (vundet/spillet): korte(1-4) " + s.dK[0] + "/" + s.dK[1] + " В· mellem(5-8) " + s.dM[0] + "/" + s.dM[1] + " В· lange(9+) " + s.dL[0] + "/" + s.dL[1] + " В· Oskars gratis fejl i KORTE dueller (bud IV-brud): " + s.budIVbrud,
    "RГҘ sekvens (V/T:ГҘrsag:serv:duel K/M/L): " + k.point.map(p => p.r + ":" + p.ГҘ + ":" + p.f + ":" + (p.l === 1 ? "K" : p.l === 2 ? "M" : p.l === 3 ? "L" : "?")).join(" "),
    "(Oskar servede fГёrst: " + (k.oskarFirst ? "ja" : "nej") + " В· 3. sГҰt = MTB: " + (k.mtb ? "ja" : "nej") + ")",
  ].join("\n");
}

// ---------- Handlinger ----------
const A = {
  tab: (id) => { S.tab = id; render(); },
  verden: (v) => { S.verden = v; S.tab = v === "udv" ? "kamp" : "status"; render(); },
  sprog: () => { S.sprog = S.sprog === "da" ? "en" : "da"; lager.gem("oskar-sprog", S.sprog); render(); },
  justToggle: () => {
    if (!S.aktiv) return;
    if (S.justAaben) { S.justAaben = false; render(); return; }
    const st = beregnStilling(S.aktiv.point, S.aktiv.oskarFirst, S.aktiv.mtb, S.aktiv.justeringer);
    S.j = { sO: st.setsO, sM: st.setsM, gO: st.gO, gM: st.gM, server: st.server !== false };
    S.justAaben = true; render();
  },
  jstep: (v) => {
    const felt = v.slice(0, 2), op = v.charAt(2) === "p" ? 1 : -1;
    const loft = felt.charAt(0) === "s" ? 1 : 6;
    S.j[felt] = Math.max(0, Math.min(loft, (S.j[felt] | 0) + op)); render();
  },
  jServer: (v) => { S.j.server = v === "1"; render(); },
  fysStart: (i) => { S.fysAktiv = { pas: +i, trin: 0 }; S.fysAfbryd = false; lager.gem("oskar-fysisk-aktiv", JSON.stringify(S.fysAktiv)); render(); },
  fysNaeste: () => {
    if (!S.fysAktiv) return;
    const alle = fysByg(S.sprog === "en")[S.fysAktiv.pas].trin;
    if (S.fysAktiv.trin + 1 >= alle.length) {
      S.fysLog.unshift({ d: new Date().toISOString().slice(0, 10), p: S.fysAktiv.pas });
      lager.gem("oskar-fysisk-log", JSON.stringify(S.fysLog));
      S.fysAktiv = null; lager.slet("oskar-fysisk-aktiv");
    } else { S.fysAktiv.trin += 1; lager.gem("oskar-fysisk-aktiv", JSON.stringify(S.fysAktiv)); }
    render();
  },
  fysAfbrydSpoerg: () => { S.fysAfbryd = true; render(); },
  fysAfbrydNej: () => { S.fysAfbryd = false; render(); },
  fysAfbrydJa: () => { S.fysAktiv = null; S.fysAfbryd = false; lager.slet("oskar-fysisk-aktiv"); render(); },
  fysSletSpoerg: (i) => { S.fysSletB = +i; render(); },
  fysSletFortryd: () => { S.fysSletB = null; render(); },
  fysSlet: (i) => { S.fysLog.splice(+i, 1); S.fysSletB = null; lager.gem("oskar-fysisk-log", JSON.stringify(S.fysLog)); render(); },
  fysEksport: () => {
    const nye = S.fysLog.filter((e) => !e.x);
    if (!nye.length) { S.fysEks = "(Ingen nye pas siden sidste eksport вҖ” alt er allerede sendt.)"; render(); return; }
    const antal = [0, 0, 0]; nye.forEach((e) => { if (antal[e.p] !== undefined) antal[e.p] += 1; });
    const alt = [0, 0, 0]; S.fysLog.forEach((e) => { if (alt[e.p] !== undefined) alt[e.p] += 1; });
    S.fysEks = "FYSISK TRГҶNING вҖ” Oskar (nyt siden sidste eksport)\n" +
      nye.map((e) => e.d + " В· Pas " + (e.p + 1)).join("\n") +
      "\nDelta: " + nye.length + " pas (Pas 1: " + antal[0] + " В· Pas 2: " + antal[1] + " В· Pas 3: " + antal[2] + ")" +
      "\nSamlet i appen: " + S.fysLog.length + " pas (Pas 1: " + alt[0] + " В· Pas 2: " + alt[1] + " В· Pas 3: " + alt[2] + ")";
    S.fysLog.forEach((e) => { e.x = 1; });
    lager.gem("oskar-fysisk-log", JSON.stringify(S.fysLog));
    render();
  },
  ttMinJust: (v) => { S.ttMin = Math.max(15, Math.min(300, S.ttMin + (+v))); render(); },
  ttKvalVaelg: (v) => { S.ttKval = +v; render(); },
  ttGem: () => {
    if (!S.ttKval) return;
    S.ttLog.unshift({ d: new Date().toISOString().slice(0, 10), m: S.ttMin, k: S.ttKval, n: S.ttNote || "" });
    lager.gem("oskar-tennis-log", JSON.stringify(S.ttLog));
    S.ttKval = 0; S.ttNote = ""; S.ttEks = null; render();
  },
  ttSletSpoerg: (i) => { S.ttSletB = +i; render(); },
  ttSletFortryd: () => { S.ttSletB = null; render(); },
  ttSlet: (i) => { S.ttLog.splice(+i, 1); S.ttSletB = null; lager.gem("oskar-tennis-log", JSON.stringify(S.ttLog)); render(); },
  kopier: (felt) => {
    const t = S[felt]; if (!t) return;
    const ok = () => { S.kopieret = felt; render(); setTimeout(() => { S.kopieret = null; render(); }, 1600); };
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(t).then(ok, ok); }
      else { const ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); ok(); }
    } catch (e) { ok(); }
  },
  delTekst: (felt) => {
    const t = S[felt]; if (!t) return;
    try { if (navigator.share) navigator.share({ text: t }); } catch (e) { /* annulleret */ }
  },
  backupLav: () => {
    S.backupTekst = "TEAMOSKAR-BACKUP-V1\n" + JSON.stringify({ kampe: S.gemte, fysLog: S.fysLog, ttLog: S.ttLog });
    S.gendanAaben = false; render();
  },
  gendanToggle: () => { S.gendanAaben = !S.gendanAaben; S.backupTekst = null; S.gendanBesked = null; render(); },
  gendanKoer: () => {
    try {
      const raa = S.gendanTekst.replace("TEAMOSKAR-BACKUP-V1", "").trim();
      const d = JSON.parse(raa);
      if (!d || !Array.isArray(d.kampe)) throw new Error("format");
      S.gemte = d.kampe.map(rensKamp).filter(Boolean);
      S.fysLog = Array.isArray(d.fysLog) ? d.fysLog : [];
      S.ttLog = Array.isArray(d.ttLog) ? d.ttLog : [];
      gemAlle();
      lager.gem("oskar-fysisk-log", JSON.stringify(S.fysLog));
      lager.gem("oskar-tennis-log", JSON.stringify(S.ttLog));
      S.gendanBesked = "OK:" + S.gemte.length + ":" + S.fysLog.length + ":" + S.ttLog.length;
      S.gendanAaben = false; S.gendanTekst = "";
    } catch (e) { S.gendanBesked = "FEJL"; }
    render();
  },
  ttEksport: () => {
    const nye = S.ttLog.filter((e) => !e.x);
    if (!nye.length) { S.ttEks = "(Ingen nye trГҰninger siden sidste eksport вҖ” alt er allerede sendt.)"; render(); return; }
    const dm = nye.reduce((a, e) => a + e.m, 0), dk = (nye.reduce((a, e) => a + e.k, 0) / nye.length).toFixed(1);
    const tm = S.ttLog.reduce((a, e) => a + e.m, 0), tk = (S.ttLog.reduce((a, e) => a + e.k, 0) / S.ttLog.length).toFixed(1);
    S.ttEks = "TENNISTRГҶNING вҖ” Oskar (nyt siden sidste eksport)\n" +
      nye.map((e) => e.d + " В· " + e.m + " min В· kvalitet " + e.k + "/5" + (e.n ? " В· " + e.n : "")).join("\n") +
      "\nDelta: " + nye.length + " trГҰninger В· " + (dm / 60).toFixed(1) + " timer В· Гҳ " + dk + "/5" +
      "\nSamlet i appen: " + S.ttLog.length + " trГҰninger В· " + (tm / 60).toFixed(1) + " timer В· Гҳ " + tk + "/5";
    S.ttLog.forEach((e) => { e.x = 1; });
    lager.gem("oskar-tennis-log", JSON.stringify(S.ttLog));
    render();
  },
  trykToggle: () => { S.tryk3 = !S.tryk3; S.aarsagValgt = null; lager.gem("oskar-tryk", S.tryk3 ? "3" : "2"); render(); },
  jAnvend: () => {
    if (!S.aktiv || !S.j) return;
    S.aktiv.justeringer = (S.aktiv.justeringer || []).concat([{ i: S.aktiv.point.length, sO: S.j.sO, sM: S.j.sM, gO: S.j.gO, gM: S.j.gM, server: S.j.server }]);
    S.justAaben = false; gemAktiv(); render();
  },
  laasOp: () => {
    if (hashKode(S.kodeInput) === KODEHASH) { S.laast = false; S.kodeFejl = false; S.kodeInput = ""; lager.gem("oskar-laas", "op"); }
    else { S.kodeFejl = true; }
    render();
  },
  felt: (navn, v) => { S[navn] = v; },
  first: (v) => { S.nyFirst = v === "1"; render(); },
  mtb: (v) => { S.nyMtb = v === "1"; render(); },
  start: () => {
    S.aktiv = { modstander: S.nyMod || "Ukendt modstander", turnering: S.nyTur || "",
      dato: new Date().toISOString().slice(0,10), oskarFirst: S.nyFirst, mtb: S.nyMtb, point: [], justeringer: [] };
    S.afventer = null; S.serv = 1; gemAktiv(); render();
  },
  serv: (v) => { S.serv = +v; render(); },
  udfald: (v) => { S.afventer = v; render(); },
  aarsag: (id) => {
    if (!S.aktiv || !S.afventer) return;
    if (!S.tryk3) {
      S.aktiv.point.push({ r: S.afventer === "vundet" ? "V" : "T", ГҘ: id, f: S.serv, l: 0 });
      S.afventer = null; S.serv = 1; gemAktiv(); render(); return;
    }
    S.aarsagValgt = id; render();
  },
  laengde: (v) => {
    if (!S.aktiv || !S.afventer || !S.aarsagValgt) return;
    S.aktiv.point.push({ r: S.afventer === "vundet" ? "V" : "T", ГҘ: S.aarsagValgt, f: S.serv, l: [1,2,3].indexOf(+v) >= 0 ? +v : 0 });
    S.afventer = null; S.aarsagValgt = null; S.serv = 1; gemAktiv(); render();
  },
  fortryd: () => {
    if (!S.aktiv) return;
    if (S.aarsagValgt) { S.aarsagValgt = null; render(); return; }
    if (S.afventer) { S.afventer = null; render(); return; }
    if (S.aktiv.point.length) { S.aktiv.point.pop(); S.serv = 1; gemAktiv(); }
    render();
  },
  afslut: () => {
    if (!S.aktiv) return;
    const st = beregnStilling(S.aktiv.point, S.aktiv.oskarFirst, S.aktiv.mtb, S.aktiv.justeringer);
    const auto = st.hist.map(h => h[2] && h[2].indexOf("MTB") === 0 ? h[2].replace("MTB ","") : h[0]+"-"+h[1]).join(", ");
    S.aktiv.resultat = S.resInput || auto; S.aktiv.afsluttet = true;
    S.gemte.unshift(S.aktiv); gemAlle();
    S.aktiv = null; S.afventer = null; S.resInput = ""; gemAktiv();
    S.tab = "historik"; render();
  },
  eksport: (i) => { S.eksport = lavEksport(S.gemte[+i]); render(); },
  analyseAabn: (i) => { S.redigerA = S.redigerA === +i ? null : +i; S.aTekst = (S.gemte[+i] && S.gemte[+i].analyse) || ""; render(); },
  analyseGem: (i) => { if (S.gemte[+i]) { S.gemte[+i].analyse = S.aTekst; gemAlle(); } S.redigerA = null; S.aTekst = ""; render(); },
  analyseAnnuller: () => { S.redigerA = null; S.aTekst = ""; render(); },
  sletSpoerg: (i) => { S.sletBekraeft = +i; render(); },
  sletFortryd: () => { S.sletBekraeft = null; render(); },
  slet: (i) => { S.gemte.splice(+i, 1); S.sletBekraeft = null; S.eksport = null; gemAlle(); render(); },
};

      h += '<p class="lille" style="margin-top:10px">'+(EN?"Claude\'s analysis of the match vs ":"Claudes analyse af kampen mod ")+esc(S.gemte[S.redigerA].modstander)+(EN?" вҖ” paste from the chat:":" вҖ” indsГҰt fra chatten:")+'</p>';

      h += '<div class="raekke" style="margin-top:6px"><button class="knap" style="background:var(--grus)" data-a="analyseGem" data-v="'+S.redigerA+'">рҹ’ҫ '+(EN?"Save analysis to match":"Gem analysen pГҘ kampen")+'</button><button class="knap" data-a="analyseAnnuller">'+(EN?"Cancel":"AnnullГ©r")+'</button></div>';
    }
    h += '<h2 style="font-size:15px;color:var(--is);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">рҹ’ҫ '+(EN?"Backup":"Sikkerhedskopi")+'</h2>' +
      '<div class="raekke"><button class="knap" style="background:transparent;border:1.5px solid var(--is);color:var(--is)" data-a="backupLav">рҹ’ҫ '+(EN?"Create full backup":"Lav fuld backup")+'</button><button class="knap" style="background:transparent;border:1.5px solid var(--kant);color:var(--daempet)" data-a="gendanToggle">вҷ»пёҸ '+(EN?"Restore":"Gendan")+'</button></div>';
    if (S.backupTekst) h += '<p class="lille">'+(EN?"Copy this text and save it in the family chat/notes вҖ” it contains ALL matches and training data on this device:":"KopiГ©r teksten og gem den i familiegruppen/noter вҖ” den indeholder ALLE kampe og trГҰningsdata pГҘ denne enhed:")+'</p><textarea readonly onfocus="this.select()" style="height:90px">'+esc(S.backupTekst)+'</textarea>' + eksportKnapper('backupTekst', EN);
    if (S.gendanAaben) {
      h += '<p class="lille">'+(EN?"Paste a backup text below. NOTE: restoring REPLACES all data on this device.":"IndsГҰt en backup-tekst herunder. OBS: Gendannelse ERSTATTER alle data pГҘ denne enhed.")+'</p>' +
        '<textarea data-felt="gendanTekst" placeholder="TEAMOSKAR-BACKUP-V1 ..." style="height:80px;color:var(--kridt)">'+esc(S.gendanTekst)+'</textarea>' +
        '<div class="raekke" style="margin-top:6px"><button class="knap" style="background:var(--tabt)" data-a="gendanKoer">'+(EN?"Restore вҖ” REPLACES current data":"Gendan вҖ” ERSTATTER nuvГҰrende data")+'</button></div>';
    }
    if (S.gendanBesked === "FEJL") h += '<p class="lille" style="color:var(--tabt);font-weight:700">'+(EN?"Could not read the backup text вҖ” check that everything was copied.":"Kunne ikke lГҰse backup-teksten вҖ” tjek at alt kom med.")+'</p>';
    if (S.gendanBesked && S.gendanBesked.indexOf("OK:") === 0) { const t = S.gendanBesked.split(":"); h += '<p class="lille" style="color:var(--vundet);font-weight:700">'+(EN?"Restored: ":"Gendannet: ")+t[1]+' '+(EN?"matches":"kampe")+' В· '+t[2]+' '+(EN?"running sessions":"lГёbepas")+' В· '+t[3]+' '+(EN?"tennis sessions":"tennistrГҰninger")+'</p>'; }
    if (S.eksport) h += '<p class="lille" style="margin-top:10px">'+(EN?"Select, copy and send to Nicolai/Claude:":"MarkГ©r, kopiГ©r og send til Nicolai/Claude:")+'</p><textarea readonly onfocus="this.select()">'+esc(S.eksport)+'</textarea>' + eksportKnapper('eksport', EN);
  }

  if (!LAAST && S.tab === "status") {
    h += '<div class="raekke"><div class="kort" style="flex:1;text-align:center;margin-bottom:0"><div style="font-size:26px;font-weight:800;color:var(--guld)">'+PROFIL.u14rang+'.</div><div style="font-size:11px;color:var(--daempet)">'+(EN?"U14 Boys (of ":"U14 Drenge (af ")+PROFIL.u14af+')</div><div style="font-weight:700;margin-top:2px">'+PROFIL.u14pt+' pt</div></div>' +
         '<div class="kort" style="flex:1;text-align:center;margin-bottom:0"><div style="font-size:26px;font-weight:800">'+PROFIL.seniorrang+'.</div><div style="font-size:11px;color:var(--daempet)">'+(EN?"Senior ranking":"Seniorranglisten")+'</div><div style="font-weight:700;margin-top:2px">WTN '+PROFIL.wtn+'</div></div></div>';
    h += '<p class="lille" style="margin:8px 0 12px">'+(EN?PROFIL_EN.fordeling:PROFIL.fordeling)+(EN?". Behind: ":". Bagved: ")+(EN?PROFIL_EN.bagved:PROFIL.bagved)+(EN?" pts. Ahead: ":" pt. Foran: ")+(EN?PROFIL_EN.foran:PROFIL.foran)+(EN?" pts.":" pt.")+'</p>';
    h += '<h2 style="font-size:15px;color:var(--is);margin:0 0 8px;text-transform:uppercase;letter-spacing:1px">'+(EN?"The 10 counting results":"De 10 tГҰllende resultater")+'</h2>';
    h += (EN?TAELLENDE_EN:TAELLENDE).map(function(t,i){ return '<div class="kort" style="display:flex;gap:10px;align-items:center;padding:8px 12px;border-left:3px solid '+(t[3]?"var(--tabt)":"transparent")+'"><span style="font-weight:800;color:var(--daempet);width:22px;font-size:12px">'+(i+1)+'.</span><div style="flex:1"><div style="font-size:12.5px;font-weight:600">'+esc(t[0])+'</div><div style="font-size:10.5px;color:'+(t[3]?"var(--tabt)":"var(--daempet)")+'">'+(t[3]?(EN?"вҸі expires ":"вҸі udlГёber "):(EN?"Expires ":"UdlГёber "))+esc(t[2])+'</div></div><span style="font-weight:800;font-size:13.5px;color:var(--guld)">'+t[1]+'</span></div>'; }).join("");
    h += '<h2 style="font-size:15px;color:var(--is);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">'+(EN?"Insights":"Indsigter")+'</h2>' + (EN?INDSIGTER_EN:INDSIGTER).map(function(x){ return '<div class="kort"><p>'+esc(x)+'</p></div>'; }).join("");
  }
  if (!LAAST && S.tab === "strategi") {
    h += '<p class="lille">'+(EN?"Six principles from the Danish federation\'s points rules вҖ” the foundation of the season plan.":"Seks principper fra DTF\'s pointregler вҖ” fundamentet under sГҰsonplanen.")+'</p>' + (EN?STRATEGI_EN:STRATEGI).map(function(r){ return '<div class="kort"><h3>'+r[0]+' '+esc(r[1])+'</h3><p>'+esc(r[2])+'</p></div>'; }).join("") +
         '<p class="lille">'+(EN?'Point scenarios ("what does a Cat. G quarterfinal move?") are computed in the chat with Claude.':'Point-scenarier ("hvad flytter en G-kvartfinale?") regnes i chatten med Claude.')+'</p>';
  }
  if (!LAAST && S.tab === "plan") {
    h += '<p class="lille">'+(EN?"рҹҺҫ Filled green = IN (place in the draw confirmed) В· вң… ENTERED = green edge В· вҳ… = top priority В· рҹҡЁ = cliff cover, must play.":"рҹҺҫ Fyldt grГёn = INDE (plads i feltet bekrГҰftet) В· вң… TILMELDT = grГёn kant В· вҳ… = hovedprioritet В· рҹҡЁ = klippe-dГҰkning, skal spilles.")+'</p>' + (EN?PLAN_EN:PLAN).map(function(u){
      var inde = u[2].indexOf("HOVEDRUNDEN")>=0 || u[2].indexOf("MAIN DRAW")>=0 || u[2].indexOf("INDE")>=0;
      var farve = (inde||u[2].indexOf("TILMELDT")>=0||u[2].indexOf("ENTERED")>=0) ? "var(--vundet)" : (u[2].indexOf("SKAL")>=0||u[2].indexOf("MUST")>=0) ? "var(--tabt)" : u[2].indexOf("вҳ…")>=0 ? "var(--guld)" : "var(--kant)";
      var statusHtml = inde
        ? '<span style="font-size:11px;font-weight:800;background:var(--vundet);color:#0B141D;padding:3px 10px;border-radius:12px;white-space:nowrap">'+esc(u[2])+'</span>'
        : '<span style="font-size:11px;font-weight:700;color:'+farve+'">'+esc(u[2])+'</span>';
      return '<div class="kort" style="border-left:3px solid '+farve+(inde?';background:linear-gradient(90deg,rgba(74,157,107,.14),transparent 55%)':'')+'"><div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center"><b style="font-size:12.5px">'+esc(u[0])+'</b>'+statusHtml+'</div><div style="font-size:12.5px;font-weight:600;margin:2px 0">'+esc(u[1])+'</div><p style="font-size:11.5px">'+esc(u[3])+'</p></div>'; }).join("");
  }
  if (!LAAST && S.tab === "regler") {
    h += (EN?REGLER_EN:REGLER).map(function(r){ return '<div style="display:flex;gap:8px;margin-bottom:9px;font-size:12.5px;line-height:1.6;color:#B9C6D2"><span style="color:var(--gruslys);font-weight:800">В§</span><span>'+esc(r)+'</span></div>'; }).join("") +
         '<a href="https://tennis.dk/spiller/ranglister/" target="_blank" rel="noopener noreferrer" style="display:block;text-align:center;background:var(--grus);color:var(--kridt);font-weight:700;font-size:13px;border-radius:8px;padding:12px 0;text-decoration:none;margin-top:12px">рҹ“Ҡ '+(EN?"Oskar\'s current DTF ranking":"Oskars aktuelle rangliste hos DTF")+'</a>';
  }

  h += '<p class="fod">'+(EN?"Data is stored locally in the browser on this device. Analyses and updates: send the export to Claude via Nicolai. Team Oskar В· July 2026.":"Data gemmes lokalt i browseren pГҘ denne enhed. Analyser og opdateringer: send eksporten til Claude via Nicolai. Team Oskar В· juli 2026.")+'</p>';
  el.innerHTML = h;
}

document.getElementById("app").addEventListener("click", (e) => {
  const b = e.target.closest("[data-a]");
  if (b) A[b.dataset.a](b.dataset.v);
});
document.getElementById("app").addEventListener("input", (e) => {
  const f = e.target.dataset.felt;
  if (f) S[f] = e.target.value;
});
render();
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(function(){ /* offline-cache er valgfri */ });
}
</script>
</body>
</html>
