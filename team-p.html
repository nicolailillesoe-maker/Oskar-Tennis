<style>
  :root { --nat:#101B26; --grus:#B0502E; --gruslys:#C97B54; --is:#9FD8E8; --kridt:#F2EDE4;
          --vundet:#3F9C5C; --tabt:#C24E4E; --daempet:#5E7386; --guld:#E3B341; --kort:#18293A; --kant:#223243; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:'Helvetica Neue', Arial, sans-serif; background:var(--nat); color:var(--kridt); }
  .wrap { max-width:700px; margin:0 auto; padding:16px 10px 40px; }
  .hero { border-left:4px solid var(--grus); padding-left:12px; margin-bottom:14px; }
  .eyebrow { font-size:10px; letter-spacing:4px; color:var(--is); text-transform:uppercase; font-weight:700; }
  h1 { font-size:25px; margin:2px 0 0; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
  .sub { font-size:12px; color:var(--daempet); }
  .tabs { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
  .tabs button { flex:1 1 15%; padding:9px 2px; border-radius:7px; cursor:pointer; font-size:11.5px; font-weight:700;
    border:1.5px solid var(--kant); background:transparent; color:var(--daempet); }
  .fane-stor { width:100%; padding:14px 6px; border-radius:12px; cursor:pointer; font-size:14px; font-weight:800;
    letter-spacing:.5px; border:1.5px solid var(--grus); background:transparent; color:var(--grus); margin-bottom:7px; }
  .fane-stor.aktiv { background:var(--grus); color:var(--kridt); }
  .dev-hero{width:100%;display:flex;align-items:center;gap:14px;text-align:left;padding:18px 16px;border-radius:16px;border:1.5px solid var(--grus);background:linear-gradient(135deg,#1A2B3C,#141F2B);color:var(--kridt);font-size:15px;cursor:pointer;margin-bottom:12px}
  .dev-hero small{color:var(--daempet);font-weight:400}
  .dev-pil{margin-left:auto;font-size:22px;color:var(--grus)}
  .dev-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .dev-flise{display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:16px 14px 14px;border-radius:16px;border:1.5px solid #2A3A4A;background:var(--kort);color:var(--kridt);cursor:pointer;text-align:left;min-height:96px}
  .dev-flise .dev-ikon{font-size:26px;margin-bottom:4px}
  .dev-flise b{font-size:13.5px;letter-spacing:.02em}
  .dev-flise small{font-size:10.5px;color:var(--daempet);line-height:1.3}
  .dev-kant{border:1.5px solid transparent !important;background-origin:border-box !important}
  .dev-kant-guld{background:linear-gradient(var(--kort),var(--kort)) padding-box,linear-gradient(135deg,#F7DE8F,#E3B341 45%,#A87A28) border-box !important}
  .dev-kant-is{background:linear-gradient(var(--kort),var(--kort)) padding-box,linear-gradient(135deg,#D9F1F8,#9FD8E8 45%,#5E93A6) border-box !important}
  .dev-kant-grus{background:linear-gradient(var(--kort),var(--kort)) padding-box,linear-gradient(135deg,#E8B394,#C97B54 45%,#8F4F31) border-box !important}
  .dev-kant-gron{background:linear-gradient(var(--kort),var(--kort)) padding-box,linear-gradient(135deg,#9FE0BC,#4CAF78 45%,#2E7A50) border-box !important}
  .dev-kant-roed{background:linear-gradient(var(--kort),var(--kort)) padding-box,linear-gradient(135deg,#F2A0A3,#E5484D 45%,#A32E32) border-box !important}
  .dev-kant-staal{background:linear-gradient(var(--kort),var(--kort)) padding-box,linear-gradient(135deg,#3E5468,#2A3A4A 45%,#18242F) border-box !important}
  .dev-fold{border:1.5px solid transparent;border-radius:16px;background:linear-gradient(var(--kort),var(--kort)) padding-box,linear-gradient(135deg,#3E5468,#2A3A4A 45%,#18242F) border-box;margin-bottom:10px;overflow:hidden}
  .dev-fold summary{list-style:none;cursor:pointer;padding:15px 14px;display:flex;align-items:flex-start;gap:12px}
  .dev-fold summary::-webkit-details-marker{display:none}
  .dev-fold summary .dev-ikon{font-size:24px;flex:none;margin-top:1px}
  .dev-fold summary b{font-size:13.5px;display:block}
  .dev-fold summary small{font-size:11px;color:var(--daempet);line-height:1.35;display:block;margin-top:2px}
  .dev-fold summary .dev-pil{margin-left:auto;font-size:13px;color:var(--daempet);transition:transform .15s}
  .dev-fold[open] summary .dev-pil{transform:rotate(90deg)}
  .dev-fold .dev-indhold{padding:2px 12px 12px}
  .dev-fold .dev-indhold > .kort{border:none !important;background:none !important;margin:0 !important;padding:2px 0 0 !important;box-shadow:none !important}
  .tabs button.aktiv { border-color:var(--is); background:var(--kort); color:var(--is); }
  .kort { background:var(--kort); border:1px solid var(--kant); border-radius:12px; padding:13px 15px; margin-bottom:9px; }
  .kort h3 { margin:0 0 3px; font-size:13.5px; }

// Beregner hele tennis-stillingen ud fra point-sekvensen.
// pts: [{r:"V"|"T", å, f}] · oskarFirst: Oskar server først · mtb: 3. sæt = match-tiebreak til 10
function beregnStilling(pts, oskarFirst, mtb, justeringer, saetTil, noAd) {
  if (!Array.isArray(pts)) pts = [];
  if (typeof oskarFirst !== "boolean") oskarFirst = true;
  const SG = saetTil === 4 ? 4 : 6;
  const TBG = SG === 4 ? 3 : 6; // NextGen: tiebreak ved 3-3
  const jmap = {};
  if (Array.isArray(justeringer)) for (const j of justeringer) { if (j && typeof j.i === "number") jmap[j.i] = j; }
  let setsO = 0, setsM = 0, gO = 0, gM = 0, pO = 0, pM = 0;
  const hist = [];
  let tb = false, tbTo = 7, tbFirst = null, server = oskarFirst;
  let done = false, vinderOskar = null;
  const flags = [];

  const anvendBasis = (b) => {
    setsO = Math.max(0, Math.min(1, b.sO | 0)); setsM = Math.max(0, Math.min(1, b.sM | 0));
    gO = Math.max(0, Math.min(SG, b.gO | 0)); gM = Math.max(0, Math.min(SG, b.gM | 0));
    pO = 0; pM = 0; server = b.server !== false;
    done = false; vinderOskar = null; tb = false; tbFirst = null; tbTo = 7;
    if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; gO = 0; gM = 0; }
    else if (gO === TBG && gM === TBG) { tb = true; tbFirst = server; }
  };

  const tbServer = (first, idx) => (Math.floor((idx + 1) / 2) % 2 === 0 ? first : !first);

  for (let _i = 0; _i < pts.length; _i++) {
    const p = pts[_i];
    if (jmap[_i]) anvendBasis(jmap[_i]);
    if (done) { flags.push({ server, ekstra: true, saet: setsO + setsM + 1 }); continue; }
    const srvNu = tb ? tbServer(tbFirst, pO + pM) : server;

    // Stort-point-analyse FØR bolden spilles
    let stor = null;
    if (tb) {
      const sætEllerMatch = tbTo === 10 || (setsO === 1 && tbTo === 7) || (setsM === 1 && tbTo === 7);
      if (pO >= tbTo - 1 && pO >= pM + 1) stor = (tbTo === 10 || setsO === 1) ? "MATCHBOLD "+SPILLER : "SÆTBOLD "+SPILLER;
      else if (pM >= tbTo - 1 && pM >= pO + 1) stor = (tbTo === 10 || setsM === 1) ? "MATCHBOLD mod "+SPILLER : "SÆTBOLD mod "+SPILLER;
      else if (pO === pM && pO >= tbTo - 2) stor = "STORT POINT";
      void sætEllerMatch;
    } else {
      const gpO = pO >= 3 && pO >= pM + 1, gpM = pM >= 3 && pM >= pO + 1;
      if (gpO) {
        const vinderSæt = gO + 1 >= SG && gO + 1 - gM >= 2;
        stor = vinderSæt && setsO === 1 ? "MATCHBOLD "+SPILLER : vinderSæt ? "SÆTBOLD "+SPILLER : srvNu ? "PARTIBOLD "+SPILLER : "BREAKBOLD "+SPILLER;
      } else if (gpM) {
        const vinderSæt = gM + 1 >= SG && gM + 1 - gO >= 2;
        stor = vinderSæt && setsM === 1 ? "MATCHBOLD mod "+SPILLER : vinderSæt ? "SÆTBOLD mod "+SPILLER : !srvNu ? "PARTIBOLD modst." : "BREAKBOLD mod "+SPILLER;
      } else if (pO === pM && pO >= 2) stor = "STORT POINT (deuce/30-30)";
    }
    flags.push({ server: srvNu, stor, tb, saet: setsO + setsM + 1 });

    // Spil bolden
    if (p.r === "V") pO++; else pM++;

    if (tb) {
      if ((pO >= tbTo || pM >= tbTo) && Math.abs(pO - pM) >= 2) {
        const oVandtTB = pO > pM;
        if (tbTo === 10) { // match-tiebreak = hele 3. sæt
          hist.push([oVandtTB ? 1 : 0, oVandtTB ? 0 : 1, `MTB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        } else {
          if (oVandtTB) gO++; else gM++;
          hist.push([gO, gM, `TB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        }
        gO = 0; gM = 0; pO = 0; pM = 0;
        server = !tbFirst; // modtageren i tiebreaken server først i næste sæt
        tb = false; tbFirst = null; tbTo = 7;
        if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
        else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
      }
    } else {
      const partiVundet = noAd ? (pO >= 4 || pM >= 4) && (Math.abs(pO - pM) >= 2 || (pO >= 3 && pM >= 3)) : (pO >= 4 || pM >= 4) && Math.abs(pO - pM) >= 2;
      if (partiVundet) {
        if (pO > pM) gO++; else gM++;
        pO = 0; pM = 0; server = !server;
        if (gO >= SG && gO - gM >= 2 || gM >= SG && gM - gO >= 2) {
          hist.push([gO, gM, null]);
          if (gO > gM) setsO++; else setsM++;
          gO = 0; gM = 0;
          if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
          else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
        } else if (gO === TBG && gM === TBG) { tb = true; tbTo = 7; tbFirst = server; }
      }
    }
  }
  if (jmap[pts.length]) anvendBasis(jmap[pts.length]);
  const nextServer = tb ? tbServer(tbFirst, pO + pM) : server;
  return { setsO, setsM, hist, gO, gM, pO, pM, tb, tbTo, server: nextServer, done, vinderOskar, flags };
}

      "\nDelta: " + nye.length + " pas (Pas 1: " + antal[0] + " · Pas 2: " + antal[1] + " · Pas 3: " + antal[2] + ")" +
      "\nSamlet i appen: " + S.fysLog.length + " pas (Pas 1: " + alt[0] + " · Pas 2: " + alt[1] + " · Pas 3: " + alt[2] + ")";
    S.fysLog.forEach((e) => { e.x = 1; });
    lager.gem("teamp-fysisk-log", JSON.stringify(S.fysLog));
    render();
  },
  ttMinJust: (v) => { S.ttMin = Math.max(15, Math.min(300, S.ttMin + (+v))); render(); },
  ttKvalVaelg: (v) => { S.ttKval = +v; render(); },
  ttTypeVaelg: (v) => { S.ttType = +v; render(); },
  ttGem: () => {
    if (!S.ttKval || !S.ttType) return;
    S.ttLog.unshift({ d: new Date().toISOString().slice(0, 10), m: S.ttMin, k: S.ttKval, t: S.ttType, n: S.ttNote || "" });
    lager.gem("teamp-tennis-log", JSON.stringify(S.ttLog));
    S.ttKval = 0; S.ttType = 0; S.ttNote = ""; S.ttEks = null; render();
  },
  ttSletSpoerg: (i) => { S.ttSletB = +i; render(); },
  ttSletFortryd: () => { S.ttSletB = null; render(); },
  ttSlet: (i) => { S.ttLog.splice(+i, 1); S.ttSletB = null; lager.gem("teamp-tennis-log", JSON.stringify(S.ttLog)); render(); },
  rkToggle: (k) => { S.rkAaben = S.rkAaben === k ? null : k; render(); },
  rivalToggle: (n) => { S.rivalAaben = S.rivalAaben === n ? null : n; render(); },
  planToggle: (i) => { S.planAaben = S.planAaben === +i ? null : +i; render(); },
  kopier: (felt) => {
    const t = S[felt]; if (!t) return;
    const ok = () => { S.kopieret = felt; render(); setTimeout(() => { S.kopieret = null; render(); }, 1600); };
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(t).then(ok, ok); }
      else { const ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); ok(); }
    } catch (e) { ok(); }
  },
  delTekst: (felt) => {
    const t = S[felt]; if (!t) return;
    try { if (navigator.share) navigator.share({ text: t }); } catch (e) { /* annulleret */ }
  },
  backupLav: () => {
    S.backupTekst = "TEAMOSKAR-BACKUP-V1\n" + JSON.stringify({ kampe: S.gemte, fysLog: S.fysLog, ttLog: S.ttLog });
    S.gendanAaben = false; render();
  },
  gendanToggle: () => { S.gendanAaben = !S.gendanAaben; S.backupTekst = null; S.gendanBesked = null; render(); },
  fletToggle: () => { S.fletAaben = !S.fletAaben; S.fletTekst = ""; S.fletBesked = null; S.backupTekst = null; S.gendanAaben = false; render(); },
  fletKoer: () => {
    try {
      const raa = S.fletTekst.replace("TEAMOSKAR-BACKUP-V1", "").trim();
      const d = JSON.parse(raa);
      if (!d || !Array.isArray(d.kampe)) throw new Error("format");
      const nye = d.kampe.map(rensKamp).filter(Boolean);
      // Dedup-nøgle: modstander + resultat + antal point (robust nok til at fange samme kamp)
      const noegle = function(k){ return (k.modstander||"") + "|" + (k.resultat||"") + "|" + (k.point ? k.point.length : 0) + "|" + (k.dato||""); };
      const findes = {}; S.gemte.forEach(function(k){ findes[noegle(k)] = true; });
      let tilfoejet = 0;
      nye.forEach(function(k){ if (!findes[noegle(k)]) { S.gemte.push(k); findes[noegle(k)] = true; tilfoejet++; } });
      // Sortér nyeste først hvis dato findes
      S.gemte.sort(function(a, b){ return (b.dato||"").localeCompare(a.dato||""); });
      // Flet også logs (dedup på dato+pas)
      if (Array.isArray(d.fysLog)) { const fN = {}; S.fysLog.forEach(function(e){ fN[e.d+"|"+e.p] = true; }); d.fysLog.forEach(function(e){ if (!fN[e.d+"|"+e.p]) { S.fysLog.push(e); fN[e.d+"|"+e.p] = true; } }); }
      if (Array.isArray(d.ttLog)) { const tN = {}; S.ttLog.forEach(function(e){ tN[JSON.stringify(e)] = true; }); d.ttLog.forEach(function(e){ if (!tN[JSON.stringify(e)]) S.ttLog.push(e); }); }
      gemAlle();
      lager.gem("teamp-fysisk-log", JSON.stringify(S.fysLog));
      lager.gem("teamp-tennis-log", JSON.stringify(S.ttLog));
      S.fletBesked = "OK:" + tilfoejet;
      S.fletAaben = false; S.fletTekst = "";
    } catch (e) { S.fletBesked = "FEJL"; }
    render();
  },
  gendanKoer: () => {
    try {
      const raa = S.gendanTekst.replace("TEAMOSKAR-BACKUP-V1", "").trim();
      const d = JSON.parse(raa);
      if (!d || !Array.isArray(d.kampe)) throw new Error("format");
      S.gemte = d.kampe.map(rensKamp).filter(Boolean);
      S.fysLog = Array.isArray(d.fysLog) ? d.fysLog : [];
      S.ttLog = Array.isArray(d.ttLog) ? d.ttLog : [];
      gemAlle();
      lager.gem("teamp-fysisk-log", JSON.stringify(S.fysLog));
      lager.gem("teamp-tennis-log", JSON.stringify(S.ttLog));
      S.gendanBesked = "OK:" + S.gemte.length + ":" + S.fysLog.length + ":" + S.ttLog.length;
      S.gendanAaben = false; S.gendanTekst = "";
    } catch (e) { S.gendanBesked = "FEJL"; }
    render();
  },
  ttEksport: () => {
    const nye = S.ttLog.filter((e) => !e.x);
    if (!nye.length) { S.ttEks = "(Ingen nye træninger siden sidste eksport — alt er allerede sendt.)"; render(); return; }
    const dm = nye.reduce((a, e) => a + e.m, 0), dk = (nye.reduce((a, e) => a + e.k, 0) / nye.length).toFixed(1);
    const tm = S.ttLog.reduce((a, e) => a + e.m, 0), tk = (S.ttLog.reduce((a, e) => a + e.k, 0) / S.ttLog.length).toFixed(1);
    S.ttEks = "TENNISTRÆNING — "+SPILLER+" (nyt siden sidste eksport)\n" +
      nye.map((e) => e.d + " · " + e.m + " min · " + (e.t===1 ? "selv" : e.t===2 ? "m. træner" : "type uoplyst") + " · kvalitet " + e.k + "/5" + (e.n ? " · " + e.n : "")).join("\n") +
      "\nDelta: " + nye.length + " træninger · " + (dm / 60).toFixed(1) + " timer · Ø " + dk + "/5 · " + nye.filter((e)=>e.t===2).length + " m. træner / " + nye.filter((e)=>e.t===1).length + " selv" +
      "\nSamlet i appen: " + S.ttLog.length + " træninger · " + (tm / 60).toFixed(1) + " timer · Ø " + tk + "/5";
    S.ttLog.forEach((e) => { e.x = 1; });
    lager.gem("teamp-tennis-log", JSON.stringify(S.ttLog));
    render();
  },
  trykToggle: () => { S.tryk3 = !S.tryk3; S.aarsagValgt = null; S.laengdeValgt = null; lager.gem("teamp-tryk", S.tryk3 ? "3" : "2"); render(); },
  vaelgHaand: (hd) => { if (hd === "venstre" || hd === "hoejre") { S.haand = hd; lager.gem("teamp-haand", hd); render(); } },
  vaelgBenchmark: (b) => { if (BENCHMARKS[b]) { S.benchmark = b; lager.gem("teamp-benchmark", b); render(); } },
  sammenlignToggle: (n) => { const i = S.sammenlign.indexOf(n); if (i >= 0) S.sammenlign.splice(i, 1); else { if (S.sammenlign.length >= 2) S.sammenlign.shift(); S.sammenlign.push(n); } render(); },
  zonerToggle: () => { S.zoner = !S.zoner; S.laengdeValgt = null; lager.gem("teamp-zoner", S.zoner ? "1" : "0"); render(); },
  jAnvend: () => {
    if (!S.aktiv || !S.j) return;
    S.aktiv.justeringer = (S.aktiv.justeringer || []).concat([{ i: S.aktiv.point.length, sO: S.j.sO, sM: S.j.sM, gO: S.j.gO, gM: S.j.gM, server: S.j.server }]);
    S.justAaben = false; gemAktiv(); render();
  },
  laasOp: () => {
    if (hashKode(S.kodeInput) === KODEHASH) { S.laast = false; S.kodeFejl = false; S.kodeInput = ""; lager.gem("teamp-laas", "op"); }
    else { S.kodeFejl = true; }
    render();
  },
  felt: (navn, v) => { S[navn] = v; },
  first: (v) => { S.nyFirst = v === "1"; render(); },
  mtb: (v) => { S.nyMtb = v === "1"; render(); },
  format: (v) => { S.nyFormat = v === "4" ? 4 : 6; render(); },
  noad: (v) => { S.nyNoAd = v === "1"; render(); },
  livToggle: () => { S.livAaben = !S.livAaben; render(); },
  start: () => {
    S.aktiv = { modstander: S.nyMod || "Ukendt modstander", turnering: S.nyTur || "",
      dato: new Date().toISOString().slice(0,10), oskarFirst: S.nyFirst, mtb: S.nyMtb, saetTil: S.nyFormat === 4 ? 4 : 6, noAd: S.nyFormat === 4 && S.nyNoAd, point: [], justeringer: [] };
    S.afventer = null; S.serv = 1; gemAktiv(); render();
  },
  serv: (v) => { S.serv = +v; render(); },
  udfald: (v) => { S.afventer = v; render(); },
  aarsag: (id) => {
    if (!S.aktiv || !S.afventer) return;
    if (!S.tryk3) {
      if (S.zoner && S.afventer === "tabt" && (id === "uf" || id === "tvunget")) {
        S.aarsagValgt = id; S.laengdeValgt = 0; render(); return;
      }
      S.aktiv.point.push({ r: S.afventer === "vundet" ? "V" : "T", å: id, f: S.serv, l: 0, z: 0 });
      S.afventer = null; S.serv = 1; gemAktiv(); render(); return;
    }
    S.aarsagValgt = id; render();
  },
  laengde: (v) => {
    if (!S.aktiv || !S.afventer || !S.aarsagValgt) return;
    const l = [1,2,3].indexOf(+v) >= 0 ? +v : 0;
    if (S.zoner && S.afventer === "tabt" && (S.aarsagValgt === "uf" || S.aarsagValgt === "tvunget")) {
      S.laengdeValgt = l; render(); return;
    }
    S.aktiv.point.push({ r: S.afventer === "vundet" ? "V" : "T", å: S.aarsagValgt, f: S.serv, l: l, z: 0 });
    S.afventer = null; S.aarsagValgt = null; S.serv = 1; gemAktiv(); render();
  },
  zone: (v) => {
    if (!S.aktiv || !S.afventer || !S.aarsagValgt || S.laengdeValgt === null) return;
    S.aktiv.point.push({ r: "T", å: S.aarsagValgt, f: S.serv, l: S.laengdeValgt, z: [1,2,3].indexOf(+v) >= 0 ? +v : 0 });
    S.afventer = null; S.aarsagValgt = null; S.laengdeValgt = null; S.serv = 1; gemAktiv(); render();
  },
  fortryd: () => {
    if (!S.aktiv) return;
    if (S.laengdeValgt !== null) { S.laengdeValgt = null; if (!S.tryk3) S.aarsagValgt = null; render(); return; }
    if (S.aarsagValgt) { S.aarsagValgt = null; render(); return; }
    if (S.afventer) { S.afventer = null; render(); return; }
    if (S.aktiv.point.length) { S.aktiv.point.pop(); S.serv = 1; gemAktiv(); }
    render();
  },
  afslut: () => {
    if (!S.aktiv) return;
    const st = beregnStilling(S.aktiv.point, S.aktiv.oskarFirst, S.aktiv.mtb, S.aktiv.justeringer, S.aktiv.saetTil, S.aktiv.noAd);
    const auto = st.hist.map(h => h[2] && h[2].indexOf("MTB") === 0 ? h[2].replace("MTB ","") : h[0]+"-"+h[1]).join(", ");
    S.aktiv.resultat = S.resInput || auto; S.aktiv.afsluttet = true;
    S.gemte.unshift(S.aktiv); gemAlle();
    S.aktiv = null; S.afventer = null; S.resInput = ""; gemAktiv();
    S.tab = "historik"; render();
  },
  eksport: (i) => { S.eksport = lavEksport(S.gemte[+i]); render(); },
  analyseAabn: (i) => { S.redigerA = S.redigerA === +i ? null : +i; S.aTekst = (S.gemte[+i] && S.gemte[+i].analyse) || ""; render(); },
  analyseGem: (i) => { if (S.gemte[+i]) { S.gemte[+i].analyse = S.aTekst; gemAlle(); } S.redigerA = null; S.aTekst = ""; render(); },
  analyseAnnuller: () => { S.redigerA = null; S.aTekst = ""; render(); },
  sletSpoerg: (i) => { S.sletBekraeft = +i; render(); },
  sletFortryd: () => { S.sletBekraeft = null; render(); },
  slet: (i) => { S.gemte.splice(+i, 1); S.sletBekraeft = null; S.eksport = null; gemAlle(); render(); },
};

const esc = (t) => String(t).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));


function avat(navn, px){
  var farver = ["#E3B341","#9FD8E8","#C97B54","#4CAF78"];
  var h = 0; for (var i = 0; i < navn.length; i++) h = (h * 31 + navn.charCodeAt(i)) >>> 0;
  var dele = navn.trim().split(/\s+/);
  var ini = (dele[0][0] + (dele.length > 1 ? dele[dele.length-1][0] : "")).toUpperCase();
  return '<span class="avat" style="width:' + px + 'px;height:' + px + 'px;font-size:' + Math.round(px*0.4) + 'px;background:' + farver[h % 4] + '">' + ini + '</span>';
}

  }
  if (!LAAST && S.tab === "plan") {
    const fokus = ugensFokus(EN);
    if (fokus) {
      h += '<div class="kort" style="border:1.5px solid var(--grus);background:linear-gradient(90deg,rgba(200,90,40,.12),transparent 60%)">' +
        '<div style="font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--grus);margin-bottom:4px">🎯 '+(EN?"THIS WEEK\'S FOCUS":"UGENS FOKUS")+'</div>' +

      var farve = (inde||u[2].indexOf("TILMELDT")>=0||u[2].indexOf("ENTERED")>=0) ? "var(--vundet)" : (u[2].indexOf("SKAL")>=0||u[2].indexOf("MUST")>=0) ? "var(--tabt)" : u[2].indexOf("★")>=0 ? "var(--guld)" : "var(--kant)";

      var titel = u[1].replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]\s*/u, "");

        : (u[2].indexOf("TILMELDT")>=0||u[2].indexOf("ENTERED")>=0) ? '<span style="font-size:12px;color:var(--vundet)">✅</span>'
        : u[2].indexOf("★")>=0 ? '<span style="font-size:12px;color:var(--guld)">★</span>'
        : (u[2].indexOf("SKAL")>=0||u[2].indexOf("MUST")>=0) ? '<span style="font-size:12px;color:var(--tabt)">🚨</span>' : '';
      var rk = '<div class="kort" data-a="planToggle" data-v="'+i+'" style="cursor:pointer;padding:11px 13px;border-left:3px solid '+farve+(inde?';background:linear-gradient(90deg,rgba(74,157,107,.14),transparent 55%)':'')+'">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
        '<span style="font-size:20px;flex:none">'+ikon+'</span>' +

  }

function devKalender(){
  var plan = (S.verden !== "udv" && S.tab === "plan");
  if (!plan && (S.tab !== "hjem" || S.verden !== "udv")) return;
  var m = document.getElementById(plan ? "dev-kal-plan" : "dev-kal");
  if (!m) return;
  fetch("kalender.json",{cache:"no-store"}).then(function(r){ return r.json(); }).then(function(d){
    var nu = new Date();
    var kommende = (d.events||[]).filter(function(e){
      return (e.team === "p" || e.team === "alle") && new Date(e.dato + "T" + (e.tid||"23:59")) > nu;
    }).sort(function(a,b){ return (a.dato+a.tid).localeCompare(b.dato+b.tid); });
    if (!kommende.length) return;
    if (plan) {
      m.innerHTML = '<div class="kort" style="border-left:3px solid var(--guld)"><h3>📅 Kampe & tider</h3>' +
        kommende.map(function(e){
          var dd = e.dato.split("-");
          return '<div style="display:flex;gap:8px;font-size:12.5px;margin-bottom:6px"><b style="color:var(--guld);flex:none">' + (+dd[2]) + "/" + (+dd[1]) + (e.tid ? " " + e.tid : "") + '</b><span>' + e.titel + " " + e.detalje + (e.sted ? ' · <span style="color:var(--daempet)">' + e.sted + '</span>' : '') + '</span></div>';
        }).join("") +
        '<p class="lille" style="margin:4px 0 0;opacity:.7">Opdateres automatisk fra kampkalenderen</p></div>';
      return;
    }
    var e = kommende[0];
    var dd = e.dato.split("-");
    m.innerHTML = "📅 " + (+dd[2]) + "/" + (+dd[1]) + (e.tid ? " kl. " + e.tid : "") + (e.sted ? " · " + e.sted : "") + " · " + e.titel + " " + e.detalje;
  }).catch(function(){});
}

const DEVFOLD_TABS = { udv: ["fysisk","anbefal","planer","s2026","guide","stil","rutiner"], pro: ["status","strategi","plan","regler"] };
window._devOpen = window._devOpen || {};
function devFoldning(){
  const liste = DEVFOLD_TABS[S.verden === "udv" ? "udv" : "pro"] || [];
  if (liste.indexOf(S.tab) < 0) return;
  const rod = document.getElementById("app");
  const noegle = S.verden + ":" + S.tab;
  const husket = window._devOpen[noegle];
  const kort = Array.prototype.slice.call(rod.querySelectorAll(".kort")).filter(function(el){
    return !el.hasAttribute("data-a") && el.querySelector("h3") && !el.closest(".dev-grid") && !el.closest("details");
  });
  if (kort.length < 2) return;
  kort.forEach(function(k, i){
    const h3 = k.querySelector("h3");
    const det = document.createElement("details");
    det.className = "dev-fold";
    det.dataset.devi = i;
    const aaben = husket ? husket.indexOf(String(i)) >= 0 : i === 0;
    if (aaben) det.open = true;
    const sum = document.createElement("summary");
    sum.innerHTML = '<span style="flex:1;min-width:0"><b>' + h3.innerHTML + '</b></span><span class="dev-pil">▶</span>';
    det.appendChild(sum);
    const ind = document.createElement("div");
    ind.className = "dev-indhold";
    k.parentNode.insertBefore(det, k);
    ind.appendChild(k);
    det.appendChild(ind);
    h3.style.display = "none";
    det.addEventListener("toggle", function(){
      const aabne = Array.prototype.slice.call(rod.querySelectorAll("details.dev-fold[open]")).map(function(d){ return d.dataset.devi; });
      window._devOpen[noegle] = aabne;
    });
  });
}

document.getElementById("app").addEventListener("click", (e) => {
  const b = e.target.closest("[data-a]");
  if (b) A[b.dataset.a](b.dataset.v);
});
document.getElementById("app").addEventListener("input", (e) => {
  const f = e.target.dataset.felt;
  if (f) S[f] = e.target.value;
});
render();
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(function(){ /* offline-cache er valgfri */ });
}
