<style>
:root{--nat:#101B26;--panel:#16232F;--is:#9FD8E8;--guld:#E3B341;--kridt:#F2EDE4;--graa:#B9C4CD;
--roed:#E5484D;--orange:#F08C2E;--gul:#F2D14E;--gron:#4CAF78}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--nat);color:var(--kridt);font-family:-apple-system,'Helvetica Neue',sans-serif;padding:20px 16px 50px;max-width:560px;margin:0 auto}
header{display:flex;align-items:center;gap:12px;margin-bottom:6px}
header img{width:38px;height:38px}
h1{font-size:1.35rem;letter-spacing:-.02em}
h1 em{font-style:normal;color:var(--is)}
.sub{color:var(--graa);font-size:.85rem;margin-bottom:18px}
.nedtaelling{background:var(--panel);border:1px solid var(--guld);border-radius:14px;padding:14px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.nedtaelling b{color:var(--guld);font-size:1.5rem}
.nedtaelling span{color:var(--graa);font-size:.85rem}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat{background:var(--panel);border-radius:12px;padding:12px 10px;text-align:center}
.stat b{display:block;font-size:1.35rem;color:var(--is)}
.stat span{font-size:.72rem;color:var(--graa)}
h2{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--guld);margin-bottom:10px}
.session{background:var(--panel);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.s-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.s-dato{font-weight:700;font-size:.95rem}
.s-tag{font-size:.7rem;padding:3px 9px;border-radius:999px;background:rgba(159,216,232,.12);color:var(--is)}
.s-info{color:var(--graa);font-size:.85rem;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.kv{display:inline-flex;gap:3px;align-items:center}
.kv i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.12)}
.s-note{margin-top:7px;font-size:.85rem;color:var(--kridt)}
footer{margin-top:26px;text-align:center;color:var(--graa);font-size:.72rem}
</style>
</head>

  <h1>Team Oskar · <em>Træningslog</em></h1>
</header>
<div class="sub">Vejen til Sommer Cup — træning for træning 🎾</div>

<div class="nedtaelling"><div><b id="dage">–</b> <span>dage til Sommer Cup</span></div><span>30. juli – 2. aug</span></div>

<div class="statgrid">
  <div class="stat"><b id="antal">0</b><span>træninger</span></div>
  <div class="stat"><b id="timer">0</b><span>timer</span></div>
  <div class="stat"><b id="kvalitet">–</b><span>Ø kvalitet</span></div>
</div>

<h2>Træningerne</h2>
<div id="liste"></div>

<footer>SportsAInalytics · opdateres af far-kontoret efter hver eksport 😄</footer>

<script>
// Nye træninger tilføjes øverst i listen her (fra app-eksporten)
var TRAENINGER = [
  {dato:"2026-07-20", min:90, type:"selv", kvalitet:2, note:"Træning med Philip"}
];

var SKALA = {1:"var(--roed)",2:"var(--roed)",3:"var(--gul)",4:"var(--gron)",5:"var(--gron)"};
var MDR = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];

function tegn(){
  var liste = document.getElementById("liste");
  var htmlDele = [];
  var sumMin = 0, sumKv = 0;
  for(var i=0;i<TRAENINGER.length;i++){
    var t = TRAENINGER[i];
    sumMin += t.min; sumKv += t.kvalitet;
    var d = new Date(t.dato);
    var prikker = "";
    for(var k=1;k<=5;k++){
      prikker += '<i style="' + (k<=t.kvalitet ? "background:"+SKALA[t.kvalitet] : "") + '"></i>';
    }
    htmlDele.push(
      '<div class="session"><div class="s-top"><span class="s-dato">' +
      d.getDate()+". "+MDR[d.getMonth()] +
      '</span><span class="s-tag">' + (t.type==="selv" ? "Selvtræning" : "Med træner") +
      '</span></div><div class="s-info"><span>⏱ ' + t.min + ' min</span>' +
      '<span class="kv">' + prikker + ' <span style="margin-left:4px">' + t.kvalitet + '/5</span></span></div>' +
      (t.note ? '<div class="s-note">' + t.note + '</div>' : '') + '</div>'
    );
  }
  liste.innerHTML = htmlDele.join("");
  document.getElementById("antal").textContent = TRAENINGER.length;
  document.getElementById("timer").textContent = (sumMin/60).toFixed(1).replace(".",",");
  document.getElementById("kvalitet").textContent = TRAENINGER.length ? (sumKv/TRAENINGER.length).toFixed(1).replace(".",",") : "–";
  var dage = Math.max(0, Math.ceil((new Date("2026-07-30") - new Date())/86400000));
  document.getElementById("dage").textContent = dage;
}
tegn();
</script>
