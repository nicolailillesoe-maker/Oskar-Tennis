<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Klub-platform — Prototype</title>
<style>
  :root {
    --nat:#101B26; --kort:#18293A; --kant:#223243; --kridt:#F2EDE4; --daempet:#5E7386;
    --is:#9FD8E8; --grus:#B0502E; --gruslys:#C97B54; --guld:#E3B341; --vundet:#3F9C5C; --tabt:#C24E4E;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--nat); color:var(--kridt); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:15px; line-height:1.5; padding-bottom:80px; }
  #app { max-width:520px; margin:0 auto; padding:14px; }
  h1 { font-size:20px; margin:2px 0; }
  h2 { font-size:15px; }
  h3 { font-size:14px; margin:0 0 6px; }
  .eyebrow { font-size:11px; font-weight:800; letter-spacing:1.5px; color:var(--daempet); text-transform:uppercase; }
  .kort { background:var(--kort); border-radius:14px; padding:13px 15px; margin-bottom:10px; }
  .lille { font-size:12px; color:var(--daempet); margin:2px 0; }
  .raekke { display:flex; gap:8px; }
  .knap { flex:1; padding:12px; border:none; border-radius:10px; background:var(--kant); color:var(--kridt); font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  .knap.til { background:var(--is); color:var(--nat); }
  .knap.valg { background:transparent; border:1.5px solid var(--kant); }
  .knap.valg.til { background:#18293A; border-color:var(--is); color:var(--is); }
  .pille { display:inline-block; font-size:11px; font-weight:800; padding:3px 9px; border-radius:10px; }
  .top { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--kant); }
  .avatar { width:38px; height:38px; border-radius:50%; background:var(--grus); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex:none; color:var(--kridt); }
  .rolle-skift { position:fixed; bottom:0; left:0; right:0; background:var(--kort); border-top:1px solid var(--kant); padding:8px 14px calc(8px + env(safe-area-inset-bottom)); }
  .rolle-skift .inner { max-width:520px; margin:0 auto; display:flex; gap:8px; }
  .fane-rk { display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:2px; }
  .fane-rk button { flex:none; padding:8px 13px; border:1px solid var(--kant); border-radius:10px; background:transparent; color:var(--daempet); font-weight:700; font-size:12.5px; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .fane-rk button.aktiv { background:var(--is); color:var(--nat); border-color:var(--is); }
  .bar-bg { background:var(--nat); border-radius:5px; height:8px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:5px; }
  .streak-chip { display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:800; padding:3px 8px; border-radius:9px; background:var(--nat); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .spiller-rk { display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--kant); cursor:pointer; }
  .spiller-rk:first-of-type { border-top:none; }
  .dim-rk { display:flex; align-items:center; gap:8px; margin:5px 0; }
  .dim-navn { font-size:12.5px; width:120px; flex:none; color:var(--daempet); }
  .stars { display:flex; gap:3px; }
  .star { font-size:22px; cursor:pointer; opacity:.28; }
  .star.on { opacity:1; }
  .badge-ai { background:linear-gradient(90deg,var(--is),var(--gruslys)); color:var(--nat); font-size:10px; font-weight:800; padding:2px 7px; border-radius:7px; letter-spacing:.5px; }
  textarea { width:100%; background:var(--nat); border:1px solid var(--kant); border-radius:10px; color:var(--kridt); padding:10px; font-family:inherit; font-size:13px; resize:vertical; }
  .proto-note { background:rgba(227,179,65,.12); border:1px solid var(--guld); border-radius:10px; padding:8px 11px; font-size:11.5px; color:var(--guld); margin-bottom:12px; }
  .medalje { font-size:15px; }
</style>
</head>
<body>
<div id="app"></div>
<div class="rolle-skift"><div class="inner" id="rollebar"></div></div>
<script>
const DATA = {"grupper": {"U14 Elite": {"aargang": "U14", "spillere": ["Oskar Lillesø", "Kevin Le Li", "Andreas Falch Midtgaard", "Philip Tiedemann", "Emil Thøgersen"]}, "U14 Talent": {"aargang": "U14", "spillere": ["Philip Aackermann", "Magnus Emde", "Victor Christiansen", "William Schlittler"]}, "U12 Udvikling": {"aargang": "U12", "spillere": ["Frederik Brandi", "Marcus Olsen", "Aaric Tajhya", "Noah Bang"]}}, "spillere": {"Oskar Lillesø": {"navn": "Oskar Lillesø", "rang": 15, "klub": "B.93", "wtn": 29.5, "erBruger": true, "gruppe": "U14 Elite", "fysStreak": 2, "tennisStreak": 12, "q1": {"serv": 3, "baglinje": 4, "net": 4, "fysik": 3, "mental": 2, "indsats": 2}, "q2": {"serv": 3, "baglinje": 4, "net": 4, "fysik": 4, "mental": 1, "indsats": 2}, "kampe": 13, "sejre": 2, "sidsteTraening": "2 dage siden", "traeningerKvartal": 25}, "Kevin Le Li": {"navn": "Kevin Le Li", "rang": 2, "klub": "Virum-Sorgenfri", "wtn": 26.2, "erBruger": false, "gruppe": "U14 Elite", "fysStreak": 4, "tennisStreak": 9, "q1": {"serv": 3, "baglinje": 2, "net": 4, "fysik": 2, "mental": 4, "indsats": 2}, "q2": {"serv": 3, "baglinje": 3, "net": 4, "fysik": 3, "mental": 4, "indsats": 3}, "kampe": 8, "sejre": 4, "sidsteTraening": "I dag", "traeningerKvartal": 16}, "Andreas Falch Midtgaard": {"navn": "Andreas Falch Midtgaard", "rang": 3, "klub": "KB", "wtn": 27.8, "erBruger": false, "gruppe": "U14 Elite", "fysStreak": 6, "tennisStreak": 9, "q1": {"serv": 2, "baglinje": 2, "net": 4, "fysik": 2, "mental": 2, "indsats": 2}, "q2": {"serv": 2, "baglinje": 1, "net": 4, "fysik": 3, "mental": 2, "indsats": 3}, "kampe": 10, "sejre": 4, "sidsteTraening": "2 dage siden", "traeningerKvartal": 16}, "Philip Tiedemann": {"navn": "Philip Tiedemann", "rang": 7, "klub": "KB", "wtn": 28.2, "erBruger": false, "gruppe": "U14 Elite", "fysStreak": 5, "tennisStreak": 10, "q1": {"serv": 3, "baglinje": 3, "net": 2, "fysik": 4, "mental": 4, "indsats": 4}, "q2": {"serv": 3, "baglinje": 4, "net": 1, "fysik": 4, "mental": 4, "indsats": 5}, "kampe": 5, "sejre": 2, "sidsteTraening": "I dag", "traeningerKvartal": 27}, "Emil Thøgersen": {"navn": "Emil Thøgersen", "rang": 9, "klub": "KB", "wtn": 29.5, "erBruger": false, "gruppe": "U14 Elite", "fysStreak": 3, "tennisStreak": 6, "q1": {"serv": 4, "baglinje": 2, "net": 2, "fysik": 4, "mental": 4, "indsats": 3}, "q2": {"serv": 3, "baglinje": 1, "net": 3, "fysik": 5, "mental": 4, "indsats": 4}, "kampe": 8, "sejre": 8, "sidsteTraening": "2 dage siden", "traeningerKvartal": 21}, "Philip Aackermann": {"navn": "Philip Aackermann", "rang": 19, "klub": "Hellerup", "wtn": 29.7, "erBruger": false, "gruppe": "U14 Talent", "fysStreak": 3, "tennisStreak": 8, "q1": {"serv": 2, "baglinje": 3, "net": 2, "fysik": 2, "mental": 4, "indsats": 4}, "q2": {"serv": 1, "baglinje": 3, "net": 2, "fysik": 3, "mental": 3, "indsats": 5}, "kampe": 9, "sejre": 6, "sidsteTraening": "I går", "traeningerKvartal": 32}, "Magnus Emde": {"navn": "Magnus Emde", "rang": 18, "klub": "Roskilde", "wtn": 31.2, "erBruger": false, "gruppe": "U14 Talent", "fysStreak": 1, "tennisStreak": 7, "q1": {"serv": 4, "baglinje": 3, "net": 3, "fysik": 2, "mental": 2, "indsats": 3}, "q2": {"serv": 3, "baglinje": 4, "net": 4, "fysik": 1, "mental": 2, "indsats": 4}, "kampe": 9, "sejre": 9, "sidsteTraening": "2 dage siden", "traeningerKvartal": 32}, "Victor Christiansen": {"navn": "Victor Christiansen", "rang": 20, "klub": "Fruens Bøge", "wtn": 31.6, "erBruger": false, "gruppe": "U14 Talent", "fysStreak": 3, "tennisStreak": 9, "q1": {"serv": 3, "baglinje": 2, "net": 2, "fysik": 4, "mental": 4, "indsats": 4}, "q2": {"serv": 4, "baglinje": 1, "net": 2, "fysik": 3, "mental": 5, "indsats": 3}, "kampe": 8, "sejre": 2, "sidsteTraening": "2 dage siden", "traeningerKvartal": 16}, "William Schlittler": {"navn": "William Schlittler", "rang": 22, "klub": "Skovbakken", "wtn": 30.8, "erBruger": false, "gruppe": "U14 Talent", "fysStreak": 8, "tennisStreak": 8, "q1": {"serv": 3, "baglinje": 3, "net": 4, "fysik": 3, "mental": 2, "indsats": 2}, "q2": {"serv": 4, "baglinje": 3, "net": 5, "fysik": 4, "mental": 2, "indsats": 2}, "kampe": 11, "sejre": 2, "sidsteTraening": "I dag", "traeningerKvartal": 23}, "Frederik Brandi": {"navn": "Frederik Brandi", "rang": 4, "klub": "Esbjerg", "wtn": 33.1, "erBruger": false, "gruppe": "U12 Udvikling", "fysStreak": 1, "tennisStreak": 12, "q1": {"serv": 4, "baglinje": 3, "net": 3, "fysik": 2, "mental": 3, "indsats": 3}, "q2": {"serv": 5, "baglinje": 2, "net": 4, "fysik": 3, "mental": 2, "indsats": 4}, "kampe": 7, "sejre": 6, "sidsteTraening": "I går", "traeningerKvartal": 25}, "Marcus Olsen": {"navn": "Marcus Olsen", "rang": 8, "klub": "Greve", "wtn": 34.0, "erBruger": false, "gruppe": "U12 Udvikling", "fysStreak": 4, "tennisStreak": 6, "q1": {"serv": 2, "baglinje": 2, "net": 2, "fysik": 4, "mental": 2, "indsats": 4}, "q2": {"serv": 2, "baglinje": 2, "net": 3, "fysik": 4, "mental": 2, "indsats": 4}, "kampe": 14, "sejre": 6, "sidsteTraening": "2 dage siden", "traeningerKvartal": 30}, "Aaric Tajhya": {"navn": "Aaric Tajhya", "rang": 12, "klub": "Greve", "wtn": 33.8, "erBruger": false, "gruppe": "U12 Udvikling", "fysStreak": 7, "tennisStreak": 12, "q1": {"serv": 2, "baglinje": 4, "net": 3, "fysik": 2, "mental": 2, "indsats": 3}, "q2": {"serv": 2, "baglinje": 4, "net": 2, "fysik": 2, "mental": 1, "indsats": 3}, "kampe": 7, "sejre": 4, "sidsteTraening": "I dag", "traeningerKvartal": 22}, "Noah Bang": {"navn": "Noah Bang", "rang": 16, "klub": "Hørsholm", "wtn": 35.2, "erBruger": false, "gruppe": "U12 Udvikling", "fysStreak": 6, "tennisStreak": 3, "q1": {"serv": 2, "baglinje": 4, "net": 2, "fysik": 4, "mental": 3, "indsats": 4}, "q2": {"serv": 2, "baglinje": 4, "net": 3, "fysik": 4, "mental": 2, "indsats": 4}, "kampe": 9, "sejre": 4, "sidsteTraening": "2 dage siden", "traeningerKvartal": 25}}, "venner": {"Oskar Lillesø": ["Kevin Le Li", "Philip Aackermann", "Frederik Brandi"], "Philip Aackermann": ["Oskar Lillesø", "Magnus Emde"], "Kevin Le Li": ["Oskar Lillesø", "Andreas Falch Midtgaard"]}, "traenere": [{"navn": "Thomas", "grupper": ["U14 Elite", "U14 Talent"]}, {"navn": "Marie", "grupper": ["U12 Udvikling"]}]};
const KONFIG = {
  klub: "B.93", klubKort: "B.93", saeson: "2026",
  aargange: ["U10","U12","U14","U16"],
  dimensioner: [
    { id:"serv", navn:"Serv", emoji:"🎾" },
    { id:"baglinje", navn:"Baglinjespil", emoji:"↔️" },
    { id:"net", navn:"Netspil", emoji:"🥅" },
    { id:"fysik", navn:"Fysik & fodarbejde", emoji:"🏃" },
    { id:"mental", navn:"Mentalt & kampmod", emoji:"🧠" },
    { id:"indsats", navn:"Indsats i dag", emoji:"🔥" },
  ],
};
const DIMNAVN = {}; KONFIG.dimensioner.forEach(d => DIMNAVN[d.id] = d);

let S = {
  rolle: "traener",        // traener | spiller
  traener: "Thomas",
  spiller: "Oskar Lillesø",
  tab: "grupper",          // træner: grupper|vurder|kvartal ; spiller: mig|gruppe|venner
  aabenGruppe: null,
  aabenSpiller: null,
  vurderGruppe: null,
  vurderScores: {},        // spiller -> {dim:score}
  vurderIndsats: {},       // hurtig-vurdering: spiller -> 1-3
  kvartalUdkast: null,
};

const el = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function init(n){ return n.split(" ").map(w=>w[0]).slice(0,2).join(""); }
function farveScore(v){ return v>=4 ? "var(--vundet)" : v>=3 ? "var(--guld)" : "var(--tabt)"; }

// ============ RENDER ============
function render(){
  let h = "";
  if (S.rolle === "traener") h = renderTraener();
  else h = renderSpiller();
  el("app").innerHTML = h;
  renderRollebar();
}

function renderRollebar(){
  el("rollebar").innerHTML =
    '<button class="knap '+(S.rolle==="traener"?"til":"")+'" data-act="rolle" data-v="traener">🧑\u200d🏫 Træner</button>' +
    '<button class="knap '+(S.rolle==="spiller"?"til":"")+'" data-act="rolle" data-v="spiller">🎾 Spiller</button>';
}

// ---------- TRÆNER ----------
function renderTraener(){
  const t = DATA.traenere.find(x=>x.navn===S.traener);
  let h = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><svg width="26" height="26" viewBox="0 0 40 40" style="flex:none"><defs><linearGradient id="sai-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9FD8E8"/><stop offset="1" stop-color="#C97B54"/></linearGradient></defs><rect width="40" height="40" rx="11" fill="url(#sai-g)"/><circle cx="20" cy="20" r="9" fill="none" stroke="#101B26" stroke-width="2.2"/><path d="M20 11 Q14 20 20 29" fill="none" stroke="#101B26" stroke-width="2.2"/><path d="M20 11 Q26 20 20 29" fill="none" stroke="#101B26" stroke-width="2.2"/></svg><div style="font-size:13px;font-weight:800;letter-spacing:-.3px;color:var(--kridt);line-height:1">Sports<span style="color:var(--is)">AI</span>nalytics</div></div>';
  h += '<div class="top"><div class="avatar">'+init(t.navn)+'</div>' +
    '<div style="flex:1"><div class="eyebrow">'+esc(KONFIG.klub)+' · TRÆNER</div><h1>'+esc(t.navn)+'</h1></div></div>';
  h += '<div class="proto-note">⚡ PROTOTYPE — fake data. Tester idéen; deling mellem enheder kommer med backend.</div>';
  h += '<div class="fane-rk">' +
    faneKnap("grupper","👥 Grupper") + faneKnap("vurder","⚡ Vurdér træning") + faneKnap("kvartal","📋 Kvartalsvurdering") + '</div>';

  if (S.tab === "grupper") h += traenerGrupper(t);
  else if (S.tab === "vurder") h += traenerVurder(t);
  else if (S.tab === "kvartal") h += traenerKvartal(t);
  return h;
}

function faneKnap(id, label){
  return '<button class="'+(S.tab===id?"aktiv":"")+'" data-act="tab" data-v="'+id+'">'+label+'</button>';
}

function traenerGrupper(t){
  if (S.aabenSpiller) return spillerDetalje(S.aabenSpiller);
  let h = "";
  t.grupper.forEach(function(gnavn){
    const g = DATA.grupper[gnavn];
    const sp = g.spillere.map(n=>DATA.spillere[n]);
    // Gruppe-gennemsnit for udvikling (q2 samlet)
    const snit = sp.reduce((a,s)=>a + Object.values(s.q2).reduce((x,y)=>x+y,0)/6, 0)/sp.length;
    h += '<div class="kort">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">' +
      '<h3>'+esc(gnavn)+'</h3><span class="pille" style="background:var(--kant);color:var(--is)">'+g.aargang+'</span></div>' +
      '<p class="lille">'+sp.length+' spillere · gruppesnit '+snit.toFixed(1)+'/5 · fælles mål pr. '+g.aargang+'</p>';
    sp.forEach(function(s){
      const udv = Object.values(s.q2).reduce((a,b)=>a+b,0) - Object.values(s.q1).reduce((a,b)=>a+b,0);
      const pil = udv>0 ? '<span style="color:var(--vundet)">▲ +'+udv+'</span>' : udv<0 ? '<span style="color:var(--tabt)">▼ '+udv+'</span>' : '<span style="color:var(--daempet)">—</span>';
      h += '<div class="spiller-rk" data-act="spiller-detalje" data-v="'+esc(s.navn)+'">' +
        '<div class="avatar" style="width:32px;height:32px;font-size:13px;'+(s.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(s.navn)+'</div>' +
        '<div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700">'+esc(s.navn)+(s.erBruger?' ⭐':'')+'</div>' +
        '<div class="lille">DTF #'+s.rang+' · '+s.kampe+' kampe · sidst trænet: '+s.sidsteTraening+'</div></div>' +
        '<div style="text-align:right;font-size:12px;font-weight:800">'+pil+'<div class="lille">kvartal</div></div>' +
        '<span style="color:var(--daempet)">›</span></div>';
    });
    h += '</div>';
  });
  return h;
}

function spillerDetalje(navn){
  const s = DATA.spillere[navn];
  let h = '<button class="knap valg" style="margin-bottom:12px;flex:none;padding:8px 14px" data-act="luk-spiller">‹ Tilbage til grupper</button>';
  h += '<div class="kort"><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">' +
    '<div class="avatar" style="width:48px;height:48px;font-size:19px">'+init(navn)+'</div>' +
    '<div><h2 style="margin:0">'+esc(navn)+'</h2><p class="lille">'+esc(s.gruppe)+' · DTF #'+s.rang+' · WTN '+s.wtn+'</p></div></div>';
  h += '<div class="grid2">' +
    miniStat("Kampe i alt", s.kampe) + miniStat("Sejrsrate", (s.kampe?Math.round(s.sejre/s.kampe*100):0)+"%") +
    miniStat("🔥 Fys-streak", s.fysStreak+" uger") + miniStat("🎾 Træning", s.traeningerKvartal+" i kvartal") + '</div></div>';
  // Udvikling pr. dimension (q1 → q2)
  h += '<div class="kort"><h3>📈 Udvikling — sidste kvartal</h3>';
  KONFIG.dimensioner.forEach(function(dim){
    const a = s.q1[dim.id], b = s.q2[dim.id];
    h += '<div class="dim-rk"><div class="dim-navn">'+dim.emoji+' '+dim.navn+'</div>' +
      '<div style="flex:1"><div class="bar-bg"><div class="bar-fill" style="width:'+(b/5*100)+'%;background:'+farveScore(b)+'"></div></div></div>' +
      '<div style="width:56px;text-align:right;font-size:12px;font-weight:700">'+a+'→'+b+' '+(b>a?'<span style="color:var(--vundet)">▲</span>':b<a?'<span style="color:var(--tabt)">▼</span>':'')+'</div></div>';
  });
  h += '</div>';
  // Data-drevet træningsmål (kobler kamp + træning)
  const svagest = KONFIG.dimensioner.slice().sort((x,y)=>s.q2[x.id]-s.q2[y.id])[0];
  h += '<div class="kort" style="border-left:3px solid var(--grus)"><div class="eyebrow" style="color:var(--grus)">🎯 DATA-DREVET TRÆNINGSMÅL</div>' +
    '<p style="margin:6px 0 0;font-size:13px">Laveste dimension er <b>'+svagest.emoji+' '+svagest.navn+'</b> ('+s.q2[svagest.id]+'/5). Kampdata viser samme mønster — sæt fokus her de næste uger. Kombinér med spillerens kamp-app for at følge om det flytter sig.</p></div>';
  return h;
}

function miniStat(label, v){
  return '<div style="background:var(--nat);border-radius:10px;padding:10px 12px"><div style="font-size:19px;font-weight:800">'+v+'</div><div class="lille">'+label+'</div></div>';
}

// ---------- HURTIG VURDERING EFTER TRÆNING ----------
function traenerVurder(t){
  if (!S.vurderGruppe){
    let h = '<p class="lille">Vælg gruppen du lige har trænet — så giver du hver spiller en hurtig vurdering på få tryk.</p>';
    t.grupper.forEach(function(g){
      h += '<div class="kort" data-act="vurder-gruppe" data-v="'+esc(g)+'" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">' +
        '<div><h3 style="margin:0">'+esc(g)+'</h3><p class="lille">'+DATA.grupper[g].spillere.length+' spillere</p></div><span style="color:var(--daempet)">›</span></div>';
    });
    return h;
  }
  // Hurtig-flow: for hver spiller — indsats (😴/👍/🔥) + valgfri stjerne-detalje
  const sp = DATA.grupper[S.vurderGruppe].spillere;
  let done = sp.filter(n => S.vurderIndsats[n]).length;
  let h = '<button class="knap valg" style="margin-bottom:10px;flex:none;padding:8px 14px" data-act="luk-vurder">‹ '+esc(S.vurderGruppe)+'</button>';
  h += '<div class="kort" style="padding:11px 14px"><div style="display:flex;justify-content:space-between;align-items:center">' +
    '<div><div class="eyebrow">DAGENS TRÆNING</div><h3 style="margin:2px 0 0">Hurtig vurdering</h3></div>' +
    '<div style="text-align:right"><div style="font-size:18px;font-weight:800">'+done+'/'+sp.length+'</div><div class="lille">færdig</div></div></div>' +
    '<p class="lille" style="margin-top:6px">Ét tryk pr. spiller — under 20 sek. i alt. Stjerner er valgfrit, hvis du vil detaljere.</p></div>';
  sp.forEach(function(n){
    const s = DATA.spillere[n];
    const valgt = S.vurderIndsats[n];
    h += '<div class="kort" style="padding:11px 13px">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:'+(valgt?'9px':'0')+'">' +
      '<div class="avatar" style="width:30px;height:30px;font-size:12px;'+(s.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(n)+'</div>' +
      '<div style="flex:1;font-size:13.5px;font-weight:700">'+esc(n)+'</div>' +
      '<div class="raekke" style="flex:none;gap:5px">' +
        vurderKnap(n,1,"😴") + vurderKnap(n,2,"👍") + vurderKnap(n,3,"🔥") + '</div></div>';
    if (valgt){
      // Valgfri detalje: to vigtigste dimensioner som stjerner
      h += '<div style="border-top:1px solid var(--kant);padding-top:8px">';
      ["serv","mental"].forEach(function(did){
        const sc = (S.vurderScores[n]||{})[did] || 0;
        let stars = '';
        for (let i=1;i<=5;i++) stars += '<span class="star '+(i<=sc?"on":"")+'" data-act="star" data-sp="'+esc(n)+'" data-dim="'+did+'" data-v="'+i+'">★</span>';
        h += '<div class="dim-rk"><div class="dim-navn">'+DIMNAVN[did].emoji+' '+DIMNAVN[did].navn+'</div><div class="stars">'+stars+'</div></div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  if (done === sp.length && done>0){
    h += '<div class="kort" style="border:1.5px solid var(--vundet);text-align:center"><h3 style="color:var(--vundet);margin:0">✓ Alle vurderet!</h3>' +
      '<p class="lille" style="margin:4px 0 0">Gemmes til spillernes historik. Efter kvartalet samler AI det til en samlet vurdering.</p></div>';
  }
  return h;
}
function vurderKnap(n, v, emoji){
  const on = S.vurderIndsats[n] === v;
  return '<button class="knap valg '+(on?"til":"")+'" style="flex:none;width:44px;padding:9px 0;font-size:17px" data-act="indsats" data-sp="'+esc(n)+'" data-v="'+v+'">'+emoji+'</button>';
}

// ---------- KVARTALSVURDERING (AI-genereret + godkend) ----------
function traenerKvartal(t){
  const alleSp = [];
  t.grupper.forEach(g => DATA.grupper[g].spillere.forEach(n => alleSp.push(n)));
  if (!S.kvartalUdkast){
    let h = '<p class="lille">AI samler kvartalets trænings- og kampdata til en vurdering pr. spiller. Du gennemlæser, retter og godkender — så sendes den til spilleren.</p>';
    alleSp.forEach(function(n){
      const s = DATA.spillere[n];
      h += '<div class="kort" style="display:flex;align-items:center;gap:10px">' +
        '<div class="avatar" style="width:30px;height:30px;font-size:12px;'+(s.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(n)+'</div>' +
        '<div style="flex:1"><div style="font-size:13.5px;font-weight:700">'+esc(n)+'</div><div class="lille">'+s.traeningerKvartal+' træninger · '+s.kampe+' kampe</div></div>' +
        '<button class="knap" style="flex:none;padding:8px 12px;font-size:12.5px" data-act="kvartal-gen" data-v="'+esc(n)+'"><span class="badge-ai">AI</span> Generér</button></div>';
    });
    return h;
  }
  // Udkast-visning
  const n = S.kvartalUdkast, s = DATA.spillere[n];
  const bedst = KONFIG.dimensioner.slice().sort((a,b)=>s.q2[b.id]-s.q2[a.id])[0];
  const svag = KONFIG.dimensioner.slice().sort((a,b)=>s.q2[a.id]-s.q2[b.id])[0];
  const udv = Object.values(s.q2).reduce((a,b)=>a+b,0) - Object.values(s.q1).reduce((a,b)=>a+b,0);
  const tekst = "Kvartalsvurdering — "+n+"\n\n"+
    n.split(" ")[0]+" har trænet "+s.traeningerKvartal+" gange og spillet "+s.kampe+" kampe i kvartalet"+(s.kampe?" ("+Math.round(s.sejre/s.kampe*100)+"% sejre)":"")+". "+
    "Størst fremgang ses samlet set ("+(udv>=0?"+":"")+udv+" point på tværs af dimensioner). "+
    "Stærkeste område er "+bedst.navn.toLowerCase()+" ("+s.q2[bedst.id]+"/5) — et tydeligt aktiv i kampene. "+
    "Fokus næste kvartal bør være "+svag.navn.toLowerCase()+" ("+s.q2[svag.id]+"/5), hvor både trænings- og kampdata peger på potentiale. "+
    "Fysisk er "+n.split(" ")[0]+" mødt stabilt op ("+s.fysStreak+" ugers streak). Fortsæt det gode fremmøde.";
  let h = '<button class="knap valg" style="margin-bottom:10px;flex:none;padding:8px 14px" data-act="luk-kvartal">‹ Alle spillere</button>';
  h += '<div class="kort"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="badge-ai">AI-UDKAST</span><h3 style="margin:0">'+esc(n)+' — Q3 2026</h3></div>' +
    '<p class="lille">Genereret fra trænings- + kampdata. Ret frit, godkend derefter.</p>' +
    '<textarea rows="9">'+esc(tekst)+'</textarea>' +
    '<div class="raekke" style="margin-top:10px">' +
    '<button class="knap valg" data-act="luk-kvartal">Kassér</button>' +
    '<button class="knap til" data-act="kvartal-godkend">✓ Godkend & send til spiller</button></div></div>';
  return h;
}

// ---------- SPILLER ----------
function renderSpiller(){
  const s = DATA.spillere[S.spiller];
  let h = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><svg width="26" height="26" viewBox="0 0 40 40" style="flex:none"><defs><linearGradient id="sai-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9FD8E8"/><stop offset="1" stop-color="#C97B54"/></linearGradient></defs><rect width="40" height="40" rx="11" fill="url(#sai-g)"/><circle cx="20" cy="20" r="9" fill="none" stroke="#101B26" stroke-width="2.2"/><path d="M20 11 Q14 20 20 29" fill="none" stroke="#101B26" stroke-width="2.2"/><path d="M20 11 Q26 20 20 29" fill="none" stroke="#101B26" stroke-width="2.2"/></svg><div style="font-size:13px;font-weight:800;letter-spacing:-.3px;color:var(--kridt);line-height:1">Sports<span style="color:var(--is)">AI</span>nalytics</div></div>';
  h += '<div class="top"><div class="avatar" style="background:var(--is);color:var(--nat)">'+init(S.spiller)+'</div>' +
    '<div style="flex:1"><div class="eyebrow">'+esc(KONFIG.klub)+' · '+esc(s.gruppe)+'</div><h1>'+esc(S.spiller.split(" ")[0])+'</h1></div></div>';
  h += '<div class="proto-note">⚡ PROTOTYPE — fake data. Streaks, venner og konkurrence deles mellem spillere når backend er på plads.</div>';
  h += '<div class="fane-rk">' + faneKnapS("mig","🎾 Mig") + faneKnapS("gruppe","🏆 Min gruppe") + faneKnapS("venner","👋 Venner") + '</div>';
  if (S.tab === "mig") h += spillerMig(s);
  else if (S.tab === "gruppe") h += spillerGruppe(s);
  else if (S.tab === "venner") h += spillerVenner(s);
  return h;
}
function faneKnapS(id,label){ return '<button class="'+(S.tab===id?"aktiv":"")+'" data-act="tab" data-v="'+id+'">'+label+'</button>'; }

function spillerMig(s){
  let h = '<div class="grid2">' +
    '<div class="kort" style="margin:0;text-align:center"><div style="font-size:30px">🔥</div><div style="font-size:24px;font-weight:800">'+s.fysStreak+'</div><div class="lille">ugers fys-streak</div></div>' +
    '<div class="kort" style="margin:0;text-align:center"><div style="font-size:30px">🎾</div><div style="font-size:24px;font-weight:800">'+s.tennisStreak+'</div><div class="lille">tennis-streak</div></div></div>';
  h += '<div class="kort" style="margin-top:10px"><h3>📋 Seneste vurdering fra træneren</h3>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="badge-ai">AI + TRÆNER</span><span class="lille">godkendt af Thomas · Q3</span></div>' +
    '<p style="font-size:13px;margin:0">Stærk fremgang på baglinjen i kvartalet. Fokus næste periode: netspil — både trænings- og kampdata peger på potentiale. Flot stabilt fremmøde! 🎾</p></div>';
  // Egen udvikling
  h += '<div class="kort"><h3>📈 Min udvikling</h3>';
  KONFIG.dimensioner.forEach(function(dim){
    const b = s.q2[dim.id];
    h += '<div class="dim-rk"><div class="dim-navn">'+dim.emoji+' '+dim.navn+'</div>' +
      '<div style="flex:1"><div class="bar-bg"><div class="bar-fill" style="width:'+(b/5*100)+'%;background:'+farveScore(b)+'"></div></div></div>' +
      '<div style="width:30px;text-align:right;font-size:12px;font-weight:700">'+b+'</div></div>';
  });
  h += '</div>';
  return h;
}

function spillerGruppe(s){
  // Streak-leaderboard i gruppen
  const sp = DATA.grupper[s.gruppe].spillere.map(n=>DATA.spillere[n]).slice().sort((a,b)=>(b.fysStreak+b.tennisStreak)-(a.fysStreak+a.tennisStreak));
  let h = '<div class="kort"><h3>🏆 '+esc(s.gruppe)+' — streak-stigen</h3><p class="lille">Samlet streak (fys + tennis) denne uge. Venlig konkurrence! 🔥</p>';
  sp.forEach(function(p,i){
    const total = p.fysStreak + p.tennisStreak;
    const medalje = i===0?'🥇':i===1?'🥈':i===2?'🥉':'<span style="color:var(--daempet);font-weight:700">'+(i+1)+'</span>';
    h += '<div class="spiller-rk" style="cursor:default">' +
      '<div style="width:24px;text-align:center" class="medalje">'+medalje+'</div>' +
      '<div class="avatar" style="width:30px;height:30px;font-size:12px;'+(p.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(p.navn)+'</div>' +
      '<div style="flex:1;font-size:13.5px;font-weight:700">'+esc(p.navn)+(p.erBruger?' <span style="color:var(--is)">(dig)</span>':'')+'</div>' +
      '<div class="streak-chip">🔥 '+total+'</div></div>';
  });
  h += '</div>';
  h += '<div class="kort" style="border-left:3px solid var(--is)"><div class="eyebrow" style="color:var(--is)">🎯 GRUPPENS FÆLLES MÅL ('+DATA.grupper[s.gruppe].aargang+')</div>' +
    '<p style="margin:6px 0 0;font-size:13px">3 træninger + 3 løbeture om ugen. <b>'+sp.filter(p=>p.fysStreak>0).length+'/'+sp.length+'</b> spillere har aktiv streak lige nu. Kom så! 💪</p></div>';
  return h;
}

function spillerVenner(s){
  const venner = DATA.venner[S.spiller] || [];
  let h = '<div class="kort"><h3>👋 Mine venner</h3><p class="lille">På tværs af træningsgrupper. Se hinandens streaks og hep på hinanden.</p>';
  venner.forEach(function(vn){
    const v = DATA.spillere[vn];
    if (!v) return;
    h += '<div class="spiller-rk" style="cursor:default">' +
      '<div class="avatar" style="width:32px;height:32px;font-size:13px">'+init(vn)+'</div>' +
      '<div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700">'+esc(vn)+'</div><div class="lille">'+esc(v.gruppe)+'</div></div>' +
      '<div class="streak-chip">🔥 '+(v.fysStreak+v.tennisStreak)+'</div></div>';
  });
  h += '</div>';
  // Forslag til nye venner (andre spillere man ikke er ven med)
  const alle = Object.keys(DATA.spillere).filter(n => n!==S.spiller && !venner.includes(n));
  h += '<div class="kort"><h3>➕ Find venner</h3>';
  alle.slice(0,5).forEach(function(n){
    const p = DATA.spillere[n];
    h += '<div class="spiller-rk" style="cursor:default">' +
      '<div class="avatar" style="width:30px;height:30px;font-size:12px">'+init(n)+'</div>' +
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+esc(n)+'</div><div class="lille">'+esc(p.gruppe)+'</div></div>' +
      '<button class="knap" style="flex:none;padding:7px 13px;font-size:12.5px" data-act="add-ven" data-v="'+esc(n)+'">Tilføj</button></div>';
  });
  h += '<p class="lille" style="margin-top:8px">🔒 I den rigtige version godkender en forælder venneanmodninger for spillere under 13.</p></div>';
  return h;
}

// ============ EVENTS ============
document.addEventListener("click", function(e){
  const t = e.target.closest("[data-act]");
  if (!t) return;
  const act = t.dataset.act, v = t.dataset.v;
  if (act === "rolle"){ S.rolle = v; S.tab = v==="traener"?"grupper":"mig"; S.aabenSpiller=null; S.vurderGruppe=null; S.kvartalUdkast=null; render(); }
  else if (act === "tab"){ S.tab = v; S.aabenSpiller=null; S.vurderGruppe=null; S.kvartalUdkast=null; render(); }
  else if (act === "spiller-detalje"){ S.aabenSpiller = v; render(); }
  else if (act === "luk-spiller"){ S.aabenSpiller = null; render(); }
  else if (act === "vurder-gruppe"){ S.vurderGruppe = v; render(); }
  else if (act === "luk-vurder"){ S.vurderGruppe = null; render(); }
  else if (act === "indsats"){ S.vurderIndsats[t.dataset.sp] = +v; render(); }
  else if (act === "star"){ const sp=t.dataset.sp, dim=t.dataset.dim; S.vurderScores[sp]=S.vurderScores[sp]||{}; S.vurderScores[sp][dim]=+v; render(); }
  else if (act === "kvartal-gen"){ S.kvartalUdkast = v; render(); }
  else if (act === "luk-kvartal"){ S.kvartalUdkast = null; render(); }
  else if (act === "kvartal-godkend"){ alert("✓ Vurdering sendt til "+S.kvartalUdkast.split(" ")[0]+"!\n\n(I prototypen er dette en demo — med backend lander den i spillerens app.)"); S.kvartalUdkast = null; render(); }
  else if (act === "add-ven"){ alert("👋 Venneanmodning sendt til "+v.split(" ")[0]+"!\n\n(Demo — med backend sendes en rigtig anmodning.)"); }
});

render();
</script>
</body>
</html>
