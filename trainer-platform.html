<style>
  :root {
    --nat:#101B26; --kort:#18293A; --kant:#223243; --kridt:#F2EDE4; --daempet:#5E7386;
    --is:#9FD8E8; --grus:#B0502E; --gruslys:#C97B54; --guld:#E3B341; --vundet:#3F9C5C; --tabt:#C24E4E;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--nat); color:var(--kridt); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; font-size:15px; line-height:1.5; padding-bottom:80px; }
  #app { max-width:520px; margin:0 auto; padding:14px; }
  h1 { font-size:20px; margin:2px 0; }
  h3 { font-size:14px; margin:0 0 6px; }
  .eyebrow { font-size:11px; font-weight:800; letter-spacing:1.5px; color:var(--daempet); text-transform:uppercase; }
  .kort { background:var(--kort); border-radius:14px; padding:13px 15px; margin-bottom:10px; }
  .lille { font-size:12px; color:var(--daempet); margin:2px 0; }
  .raekke { display:flex; gap:8px; }
  .knap { flex:1; padding:12px; border:none; border-radius:10px; background:var(--kant); color:var(--kridt); font-weight:700; font-size:14px; cursor:pointer; font-family:inherit; }
  .knap.til { background:var(--is); color:var(--nat); }
  .knap.valg { background:transparent; border:1.5px solid var(--kant); }
  .knap.valg.til { background:#18293A; border-color:var(--is); color:var(--is); }
  .top { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--kant); }
  .avatar { width:38px; height:38px; border-radius:50%; background:var(--grus); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex:none; color:var(--kridt); }
  .rolle-skift { position:fixed; bottom:0; left:0; right:0; background:var(--kort); border-top:1px solid var(--kant); padding:8px 14px calc(8px + env(safe-area-inset-bottom)); }
  .rolle-skift .inner { max-width:520px; margin:0 auto; display:flex; gap:8px; }
  .fane-rk { display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:2px; }
  .fane-rk button { flex:none; padding:8px 13px; border:1px solid var(--kant); border-radius:10px; background:transparent; color:var(--daempet); font-weight:700; font-size:12.5px; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .fane-rk button.aktiv { background:var(--is); color:var(--nat); border-color:var(--is); }
  .streak-chip { display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:800; padding:3px 8px; border-radius:9px; background:var(--nat); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .spiller-rk { display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--kant); cursor:pointer; }
  .spiller-rk:first-of-type { border-top:none; }
  .badge-ai { background:linear-gradient(90deg,var(--is),var(--gruslys)); color:var(--nat); font-size:10px; font-weight:800; padding:2px 7px; border-radius:7px; letter-spacing:.5px; }
  textarea { width:100%; background:var(--nat); border:1px solid var(--kant); border-radius:10px; color:var(--kridt); padding:10px; font-family:inherit; font-size:13px; resize:vertical; line-height:1.55; }
  .proto-note { background:rgba(227,179,65,.12); border:1px solid var(--guld); border-radius:10px; padding:8px 11px; font-size:11.5px; color:var(--guld); margin-bottom:12px; }
  .medalje { font-size:15px; }
  .dot { width:34px; height:34px; border-radius:50%; border:2px solid var(--kant); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex:none; }
  .dot.valgt { border-color:var(--kridt); box-shadow:0 0 0 2px var(--nat), 0 0 0 4px currentColor; }
  .skala-band { display:flex; align-items:center; gap:9px; padding:6px 0; font-size:12.5px; }
  .skala-cirkel { width:15px; height:15px; border-radius:50%; flex:none; }
  .logo-rk { display:flex; align-items:center; gap:9px; margin-bottom:12px; }
</style>
</head>
<body>
<div id="app"></div>

let S = {
  rolle: "traener", traener: "Cheftræneren", spiller: "Oskar Lillesø",
  tab: "grupper", aabenSpiller: null,
  vurderOmraade: null, vurderGruppe: null, vurderScores: {},
  kvartalUdkast: null,
};
const el = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function init(n){ return n.split(" ").map(w=>w[0]).slice(0,2).join(""); }
function snitVurd(s){ const v=Object.values(s.vurdering||{}).map(x=>x.score); return v.length? v.reduce((a,b)=>a+b,0)/v.length : 0; }

function render(){
  el("app").innerHTML = S.rolle === "traener" ? renderTraener() : renderSpiller();
  el("rollebar").innerHTML =
    '<button class="knap '+(S.rolle==="traener"?"til":"")+'" data-act="rolle" data-v="traener">🧑\u200d🏫 Træner</button>' +
    '<button class="knap '+(S.rolle==="spiller"?"til":"")+'" data-act="rolle" data-v="spiller">🎾 Spiller</button>';
}

// ---------- TRÆNER ----------
function renderTraener(){
  const t = DATA.traenere.find(x=>x.navn===S.traener);
  let h = LOGO + '<div class="top"><div class="avatar">'+init(t.navn)+'</div>' +
    '<div style="flex:1"><div class="eyebrow">'+esc(KONFIG.klub)+' · TRÆNER</div><h1>'+esc(t.navn)+'</h1></div></div>';
  h += '<div class="proto-note">⚡ PROTOTYPE — fake data. 💡 <b>Prøv loopet:</b> giv Oskar en score under ⚡ Vurdér træning — skift så til 🎾 Spiller og se den lande.</div>';
  h += '<div class="fane-rk">'+faneKnap("grupper","👥 Grupper")+faneKnap("vurder","⚡ Vurdér træning")+faneKnap("kvartal","📋 Evaluering")+'</div>';
  if (S.tab==="grupper") h += traenerGrupper(t);
  else if (S.tab==="vurder") h += traenerVurder(t);
  else if (S.tab==="kvartal") h += traenerKvartal(t);
  return h;
}
function faneKnap(id,label){ return '<button class="'+(S.tab===id?"aktiv":"")+'" data-act="tab" data-v="'+id+'">'+label+'</button>'; }

function traenerGrupper(t){
  if (S.aabenSpiller) return spillerDetalje(S.aabenSpiller);
  let h = "";
  t.grupper.forEach(function(gnavn){
    const g = DATA.grupper[gnavn], sp = g.spillere.map(n=>DATA.spillere[n]);
    const snit = sp.reduce((a,s)=>a+snitVurd(s),0)/sp.length;
    h += '<div class="kort"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">' +
      '<h3>'+esc(gnavn)+'</h3><span style="font-size:11px;font-weight:800;background:var(--kant);color:var(--is);padding:3px 9px;border-radius:10px">'+g.aargang+'</span></div>' +
      '<p class="lille">'+sp.length+' spillere · snit '+snit.toFixed(1)+'/10 · fælles mål pr. '+g.aargang+'</p>';
    sp.forEach(function(s){
      const sn = snitVurd(s), b = skala(Math.round(sn));
      h += '<div class="spiller-rk" data-act="spiller-detalje" data-v="'+esc(s.navn)+'">' +
        '<div class="avatar" style="width:32px;height:32px;font-size:13px;'+(s.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(s.navn)+'</div>' +
        '<div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700">'+esc(s.navn)+(s.erBruger?' ⭐':'')+'</div>' +
        '<div class="lille">DTF #'+s.rang+' · '+s.kampe+' kampe · sidst: '+s.sidsteTraening+'</div></div>' +
        '<div style="display:flex;align-items:center;gap:6px"><span style="width:11px;height:11px;border-radius:50%;background:'+b.farve+';display:inline-block"></span><b style="font-size:13px">'+sn.toFixed(1)+'</b></div>' +
        '<span style="color:var(--daempet)">›</span></div>';
    });
    h += '</div>';
  });
  return h;
}

function spillerDetalje(navn){
  const s = DATA.spillere[navn];
  let h = '<button class="knap valg" style="margin-bottom:12px;flex:none;padding:8px 14px" data-act="luk-spiller">‹ Tilbage</button>';
  h += '<div class="kort"><div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">' +
    '<div class="avatar" style="width:48px;height:48px;font-size:19px">'+init(navn)+'</div>' +
    '<div><h1 style="margin:0;font-size:19px">'+esc(navn)+'</h1><p class="lille">'+esc(s.gruppe)+' · DTF #'+s.rang+' · WTN '+s.wtn+'</p></div></div>';
  h += '<div class="grid2" style="margin-top:8px">' +
    mini("Kampe", s.kampe) + mini("Sejrsrate", (s.kampe?Math.round(s.sejre/s.kampe*100):0)+"%") +
    mini("🔥 Fys-streak", s.fysStreak+" uger") + mini("🎾 Træninger", s.traeningerKvartal) + '</div></div>';
  h += faellesLag(s);
  // Vurdering pr. område (score + tekst)
  h += '<div class="kort"><h3>📋 Seneste vurdering pr. område</h3>';
  KONFIG.omraader.forEach(function(o){
    const v = (s.vurdering||{})[o.id]; if (!v) return;
    const b = skala(v.score);
    h += '<div style="border-top:1px solid var(--kant);padding:10px 0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">' +
      '<span style="width:13px;height:13px;border-radius:50%;background:'+b.farve+';flex:none"></span>' +
      '<b style="font-size:13px">'+o.emoji+' '+esc(o.navn)+'</b>' +
      '<span style="margin-left:auto;font-size:12px;font-weight:800;color:'+b.farve+'">'+v.score+'/10</span></div>' +
      '<p style="font-size:12px;color:var(--daempet);margin:0 0 0 21px;line-height:1.5">'+esc(v.tekst)+'</p></div>';
  });
  h += '</div>';
  // Data-drevet fokus: svageste område
  const omr = KONFIG.omraader.filter(o=>(s.vurdering||{})[o.id]);
  if (omr.length){
    const svag = omr.slice().sort((a,b)=>s.vurdering[a.id].score - s.vurdering[b.id].score)[0];
    h += '<div class="kort" style="border-left:3px solid var(--grus)"><div class="eyebrow" style="color:var(--grus)">🎯 DATA-DREVET FOKUS</div>' +
      '<p style="margin:6px 0 0;font-size:13px">Laveste score er <b>'+svag.emoji+' '+esc(svag.navn)+'</b> ('+s.vurdering[svag.id].score+'/10). Sæt træningsfokus her — og følg med i spillerens kamp-app, om det flytter sig.</p></div>';
  }
  return h;
}
function mini(label,v){ return '<div style="background:var(--nat);border-radius:10px;padding:10px 12px"><div style="font-size:19px;font-weight:800">'+v+'</div><div class="lille">'+label+'</div></div>'; }

function faellesLag(s){
  if (!s.kampliste || !s.kampliste.length) return "";
  const st = s.statistik || {};
  let h = '<div class="kort" style="border-left:3px solid var(--is)"><div class="eyebrow" style="color:var(--is)">\ud83d\udd17 F\u00c6LLES LAG \u2014 FRA KAMP-APP\u0027EN</div>';
  // Fuld statistik
  h += '<div class="grid2" style="margin-top:8px">' +
    mini("Point vundet", (st.pointPct||0)+"%") +
    mini("Vindere", (st.vindere||0)+" (heraf "+(st.esser||0)+" es)") +
    mini("Gratis fejl", (st.uf||0)+" (heraf "+(st.dobbelt||0)+" db)") +
    mini("Vindere \u2212 fejl", (st.diff>0?"+":"")+(st.diff||0)) + '</div>';
  // Kamp-for-kamp søjler (vindere + fejl pr. kamp)
  const soejleRk = function(label, vals, farve){
    const mx = Math.max.apply(null, vals.concat([1]));
    return '<div style="font-size:10.5px;color:var(--daempet);margin:9px 0 2px">'+label+' \u2014 kamp for kamp (\u00e6ldste \u2192 nyeste)</div>' +
      '<div style="display:flex;align-items:flex-end;gap:3px;height:30px">' +
      vals.map(function(v,i){ return '<span style="flex:1;max-width:16px;border-radius:2px 2px 0 0;background:'+farve+';opacity:'+(i===vals.length-1?'1':'.65')+';height:'+Math.max(3,Math.round(v/mx*30))+'px'+(i===vals.length-1?';outline:1.5px solid var(--kridt)':'')+'"></span>'; }).join("") + '</div>';
  };
  h += soejleRk("Vindere", s.kampliste.map(function(k){return k.vin;}), "var(--vundet)");
  h += soejleRk("Gratis fejl", s.kampliste.map(function(k){return k.uf;}), "var(--tabt)");
  // Alle kampe
  h += '<h3 style="margin:12px 0 4px">\ud83c\udfbe Alle kampe ('+s.kampliste.length+')</h3>';
  s.kampliste.slice().reverse().forEach(function(k){
    h += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--kant);font-size:12px">' +
      '<span style="font-weight:800;width:14px;color:'+(k.v?'var(--vundet)':'var(--tabt)')+'">'+(k.v?'V':'T')+'</span>' +
      '<span style="flex:1;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(k.mod)+'</span>' +
      '<span style="color:var(--daempet);flex:none">'+esc(k.res)+'</span>' +
      '<span style="color:var(--daempet);flex:none;font-size:10.5px">'+esc(k.dato.slice(5))+'</span></div>';
  });
  // Pr. modstander
  if (s.rivaler){
    h += '<h3 style="margin:12px 0 4px">\ud83c\udfaf Pr. modstander</h3><div>';
    Object.keys(s.rivaler).forEach(function(mod){
      const r = s.rivaler[mod];
      h += '<span style="display:inline-block;background:var(--nat);border-radius:9px;padding:4px 9px;margin:2px 4px 2px 0;font-size:11.5px"><b>'+esc(mod.split(" ").pop())+'</b> <span style="color:'+(r.v*2>=r.k?'var(--vundet)':'var(--tabt)')+';font-weight:800">'+r.v+'-'+(r.k-r.v)+'</span></span>';
    });
    h += '</div>';
  }
  // Sæson
  if (DATA.saeson && DATA.saeson.length){
    h += '<h3 style="margin:12px 0 4px">\ud83d\udcc5 S\u00e6son</h3>';
    DATA.saeson.forEach(function(e){ h += '<p class="lille" style="margin:3px 0">'+esc(e)+'</p>'; });
  }
  h += '<p class="lille" style="margin-top:8px">Samme tal hos spiller og tr\u00e6ner. Den fulde motor-analyse (serveprocenter, breakbolde, benchmark-sammenligning) bor i spillerens kamp-app \u2014 med backend spejles den 1:1 her.</p></div>';
  return h;
}
// ---------- HURTIG VURDERING ----------
function traenerVurder(t){
  if (!S.vurderOmraade){
    let h = '<p class="lille">Hvad trænede du? Vælg område — så giver du hver spiller en score på farveskalaen med ét tryk.</p>';
    KONFIG.omraader.forEach(function(o){
      h += '<div class="kort" data-act="vurder-omraade" data-v="'+o.id+'" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">' +
        '<h3 style="margin:0">'+o.emoji+' '+esc(o.navn)+'</h3><span style="color:var(--daempet)">›</span></div>';
    });
    h += skalaForklaring();
    return h;
  }
  if (!S.vurderGruppe){
    let h = '<button class="knap valg" style="margin-bottom:10px;flex:none;padding:8px 14px" data-act="luk-omraade">‹ Skift område</button>';
    h += '<p class="lille">'+OMRNAVN[S.vurderOmraade].emoji+' '+esc(OMRNAVN[S.vurderOmraade].navn)+' — vælg gruppe:</p>';
    t.grupper.forEach(function(g){
      h += '<div class="kort" data-act="vurder-gruppe" data-v="'+esc(g)+'" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">' +
        '<div><h3 style="margin:0">'+esc(g)+'</h3><p class="lille">'+DATA.grupper[g].spillere.length+' spillere</p></div><span style="color:var(--daempet)">›</span></div>';
    });
    return h;
  }
  const sp = DATA.grupper[S.vurderGruppe].spillere;
  const done = sp.filter(n => S.vurderScores[n]).length;
  let h = '<button class="knap valg" style="margin-bottom:10px;flex:none;padding:8px 14px" data-act="luk-gruppe">‹ '+esc(S.vurderGruppe)+'</button>';
  h += '<div class="kort" style="padding:11px 14px"><div style="display:flex;justify-content:space-between;align-items:center">' +
    '<div><div class="eyebrow">'+OMRNAVN[S.vurderOmraade].emoji+' '+esc(OMRNAVN[S.vurderOmraade].navn).toUpperCase()+'</div><h3 style="margin:2px 0 0">Dagens indsats</h3></div>' +
    '<div style="text-align:right"><div style="font-size:18px;font-weight:800">'+done+'/'+sp.length+'</div><div class="lille">færdig</div></div></div>' +
    '<p class="lille" style="margin-top:6px">Ét tryk pr. spiller på farveskalaen — under 20 sek. i alt.</p></div>';
  sp.forEach(function(n){
    const s = DATA.spillere[n], valgt = S.vurderScores[n];
    h += '<div class="kort" style="padding:11px 13px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">' +
      '<div class="avatar" style="width:28px;height:28px;font-size:11px;'+(s.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(n)+'</div>' +
      '<div style="flex:1;font-size:13px;font-weight:700">'+esc(n)+'</div></div>' +
      '<div style="display:flex;gap:7px;justify-content:space-between">';
    KONFIG.farveskala.forEach(function(b){
      const on = valgt === b.max;
      h += '<div class="dot'+(on?' valgt':'')+'" style="background:'+b.farve+';color:'+b.farve+'" data-act="score" data-sp="'+esc(n)+'" data-v="'+b.max+'"><span style="color:#fff;font-size:9px">'+b.min+'-'+b.max+'</span></div>';
    });
    h += '</div></div>';
  });
  if (done===sp.length && done>0){
    h += '<div class="kort" style="border:1.5px solid var(--vundet);text-align:center"><h3 style="color:var(--vundet);margin:0">✓ Alle vurderet!</h3>' +
      '<p class="lille" style="margin:4px 0 0">Gemmes til spillernes historik. Ved kvartalets slut samler AI det til en evaluering.</p></div>';
  }
  return h;
}
function skalaForklaring(){
  let h = '<div class="kort" style="margin-top:4px"><div class="eyebrow">FARVESKALA</div>';
  KONFIG.farveskala.forEach(function(b){
    h += '<div class="skala-band"><span class="skala-cirkel" style="background:'+b.farve+'"></span><b>'+b.min+'-'+b.max+'</b> = '+esc(b.label)+'</div>';
  });
  h += '</div>';
  return h;
}

// ---------- EVALUERING (kvartals, mail-format) ----------
function traenerKvartal(t){
  const alleSp = []; t.grupper.forEach(g => DATA.grupper[g].spillere.forEach(n => alleSp.push(n)));
  if (!S.kvartalUdkast){
    let h = '<p class="lille">AI samler kvartalets scores og noter til en evaluering pr. spiller — i klubbens format. Du retter og godkender, så sendes den til spilleren.</p>';
    alleSp.forEach(function(n){
      const s = DATA.spillere[n];
      h += '<div class="kort" style="display:flex;align-items:center;gap:10px">' +
        '<div class="avatar" style="width:30px;height:30px;font-size:12px;'+(s.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(n)+'</div>' +
        '<div style="flex:1"><div style="font-size:13.5px;font-weight:700">'+esc(n)+'</div><div class="lille">'+s.traeningerKvartal+' træninger · '+s.kampe+' kampe</div></div>' +
        '<button class="knap" style="flex:none;padding:8px 12px;font-size:12.5px" data-act="kvartal-gen" data-v="'+esc(n)+'"><span class="badge-ai">AI</span> Generér</button></div>';
    });
    return h;
  }
  const n = S.kvartalUdkast, s = DATA.spillere[n], fornavn = n.split(" ")[0];
  let tekst = "Hej "+fornavn+"\n\nHermed evaluering fra "+KONFIG.maaned+" "+KONFIG.saeson+"\n\nSpiller: "+n+"\nTræner: "+t.navn+"\n";
  KONFIG.omraader.forEach(function(o){
    const v = (s.vurdering||{})[o.id]; if (!v) return;
    const b = skala(v.score);
    tekst += "\n"+o.navn+"\n"+b.emoji+" "+b.min+"-"+b.max+" = "+b.label+". "+v.tekst+"\n";
  });
  S.kvartalTekst = tekst;
  let h = '<button class="knap valg" style="margin-bottom:10px;flex:none;padding:8px 14px" data-act="luk-kvartal">‹ Alle spillere</button>';
  h += '<div class="kort"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="badge-ai">AI-UDKAST</span><h3 style="margin:0">'+esc(n)+'</h3></div>' +
    '<p class="lille">Samlet fra scores + noter i klubbens format. Ret frit, godkend derefter.</p>' +
    '<textarea id="evalTekst" rows="16">'+esc(tekst)+'</textarea>' +
    '<div class="raekke" style="margin-top:10px"><button class="knap valg" data-act="luk-kvartal">Kassér</button>' +
    '<button class="knap til" data-act="kvartal-godkend">✓ Godkend & send</button></div></div>';
  return h;
}

// ---------- SPILLER ----------
function renderSpiller(){
  const s = DATA.spillere[S.spiller];
  let h = LOGO + '<div class="top"><div class="avatar" style="background:var(--is);color:var(--nat)">'+init(S.spiller)+'</div>' +
    '<div style="flex:1"><div class="eyebrow">'+esc(KONFIG.klub)+' · '+esc(s.gruppe)+'</div><h1>'+esc(S.spiller.split(" ")[0])+'</h1></div></div>';
  h += '<div class="proto-note">⚡ PROTOTYPE — fake data. Streaks og venner deles mellem spillere når backend er på plads.</div>';
  h += '<div class="fane-rk">'+fS("mig","🎾 Mig")+fS("gruppe","🏆 Min gruppe")+fS("venner","👋 Venner")+'</div>';
  if (S.tab==="mig") h += spillerMig(s);
  else if (S.tab==="gruppe") h += spillerGruppe(s);
  else if (S.tab==="venner") h += spillerVenner(s);
  return h;
}
function fS(id,label){ return '<button class="'+(S.tab===id?"aktiv":"")+'" data-act="tab" data-v="'+id+'">'+label+'</button>'; }

function spillerMig(s){
  let h = '<div class="grid2">' +
    '<div class="kort" style="margin:0;text-align:center"><div style="font-size:30px">🔥</div><div style="font-size:24px;font-weight:800">'+s.fysStreak+'</div><div class="lille">ugers fys-streak</div></div>' +
    '<div class="kort" style="margin:0;text-align:center"><div style="font-size:30px">🎾</div><div style="font-size:24px;font-weight:800">'+s.tennisStreak+'</div><div class="lille">tennis-streak</div></div></div>';
  // Dagens træning (fra trænerens hurtig-vurdering — LOOPET)
  if (s.dagens){ const b = skala(s.dagens.score); const o = OMRNAVN[s.dagens.omraade]||{navn:s.dagens.omraade,emoji:"\ud83c\udfbe"};
    h += '<div class="kort" style="margin-top:10px;border:1.5px solid '+b.farve+'"><div class="eyebrow">\ud83d\udd14 DAGENS TR\u00c6NING \u2014 NY</div>' +
      '<div style="display:flex;align-items:center;gap:8px;margin-top:5px"><span style="width:13px;height:13px;border-radius:50%;background:'+b.farve+';flex:none"></span>' +
      '<b style="font-size:13px">'+o.emoji+' '+esc(o.navn)+'</b><span style="margin-left:auto;font-weight:800;color:'+b.farve+'">'+s.dagens.score+'/10</span></div>' +
      '<p class="lille" style="margin:5px 0 0">'+esc(b.label)+' \u00b7 registreret af '+esc(S.traener)+' lige nu.</p></div>'; }
  // Fælles lag: kampe, statistik, sæson
  h += faellesLag(s);
  // Seneste evaluering (mail-format)
  h += '<div class="kort" style="margin-top:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="badge-ai">AI + TR\u00c6NER</span>' +
    (s.evalNy ? '<span style="background:var(--guld);color:var(--nat);font-size:10px;font-weight:800;padding:2px 7px;border-radius:7px">\u2709\ufe0f NY</span>' : '') +
    '<span class="lille">godkendt af '+esc(S.traener)+' \u00b7 '+KONFIG.maaned+' '+KONFIG.saeson+'</span></div>' +
    '<h3 style="margin:0 0 8px">\ud83d\udccb Din evaluering</h3>';
  if (s.evalSendt){
    h += '<p style="font-size:12.5px;line-height:1.55;white-space:pre-wrap;margin:0">'+esc(s.evalSendt)+'</p>';
  } else {
    KONFIG.omraader.forEach(function(o){
      const v = (s.vurdering||{})[o.id]; if (!v) return;
      const b = skala(v.score);
      h += '<div style="border-top:1px solid var(--kant);padding:10px 0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">' +
        '<span style="width:13px;height:13px;border-radius:50%;background:'+b.farve+';flex:none"></span>' +
        '<b style="font-size:13px">'+esc(o.navn)+'</b>' +
        '<span style="margin-left:auto;font-size:11.5px;font-weight:800;color:'+b.farve+'">'+b.min+'-'+b.max+' \u00b7 '+esc(b.label)+'</span></div>' +
        '<p style="font-size:12.5px;margin:0;line-height:1.55">'+esc(v.tekst)+'</p></div>';
    });
  }
  h += '</div>';
  return h;
}

function spillerGruppe(s){
  const sp = DATA.grupper[s.gruppe].spillere.map(n=>DATA.spillere[n]).slice().sort((a,b)=>(b.fysStreak+b.tennisStreak)-(a.fysStreak+a.tennisStreak));
  let h = '<div class="kort"><h3>🏆 '+esc(s.gruppe)+' — streak-stigen</h3><p class="lille">Samlet streak (fys + tennis) denne uge. Venlig konkurrence! 🔥</p>';
  sp.forEach(function(p,i){
    const total = p.fysStreak+p.tennisStreak, m = i===0?'🥇':i===1?'🥈':i===2?'🥉':'<span style="color:var(--daempet);font-weight:700">'+(i+1)+'</span>';
    h += '<div class="spiller-rk" style="cursor:default"><div style="width:24px;text-align:center" class="medalje">'+m+'</div>' +
      '<div class="avatar" style="width:30px;height:30px;font-size:12px;'+(p.erBruger?'background:var(--is);color:var(--nat)':'')+'">'+init(p.navn)+'</div>' +
      '<div style="flex:1;font-size:13.5px;font-weight:700">'+esc(p.navn)+(p.erBruger?' <span style="color:var(--is)">(dig)</span>':'')+'</div>' +
      '<div class="streak-chip">🔥 '+total+'</div></div>';
  });
  h += '</div><div class="kort" style="border-left:3px solid var(--is)"><div class="eyebrow" style="color:var(--is)">🎯 GRUPPENS FÆLLES MÅL ('+DATA.grupper[s.gruppe].aargang+')</div>' +
    '<p style="margin:6px 0 0;font-size:13px">3 træninger + 3 løbeture om ugen. <b>'+sp.filter(p=>p.fysStreak>0).length+'/'+sp.length+'</b> med aktiv streak lige nu. Kom så! 💪</p></div>';
  return h;
}

function spillerVenner(s){
  const venner = DATA.venner[S.spiller] || [];
  let h = '<div class="kort"><h3>👋 Mine venner</h3><p class="lille">På tværs af træningsgrupper. Se hinandens streaks og hep på hinanden.</p>';
  venner.forEach(function(vn){ const v = DATA.spillere[vn]; if(!v) return;
    h += '<div class="spiller-rk" style="cursor:default"><div class="avatar" style="width:32px;height:32px;font-size:13px">'+init(vn)+'</div>' +
      '<div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:700">'+esc(vn)+'</div><div class="lille">'+esc(v.gruppe)+'</div></div>' +
      '<div class="streak-chip">🔥 '+(v.fysStreak+v.tennisStreak)+'</div></div>';
  });
  h += '</div>';
  const alle = Object.keys(DATA.spillere).filter(n => n!==S.spiller && !venner.includes(n));
  h += '<div class="kort"><h3>➕ Find venner</h3>';
  alle.slice(0,5).forEach(function(n){ const p = DATA.spillere[n];
    h += '<div class="spiller-rk" style="cursor:default"><div class="avatar" style="width:30px;height:30px;font-size:12px">'+init(n)+'</div>' +
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+esc(n)+'</div><div class="lille">'+esc(p.gruppe)+'</div></div>' +
      '<button class="knap" style="flex:none;padding:7px 13px;font-size:12.5px" data-act="add-ven" data-v="'+esc(n)+'">Tilføj</button></div>';
  });
  h += '<p class="lille" style="margin-top:8px">🔒 For spillere under 13 godkender en forælder venneanmodninger.</p></div>';
  return h;
}

// ---------- EVENTS ----------
document.addEventListener("click", function(e){
  const t = e.target.closest("[data-act]"); if (!t) return;
  const act = t.dataset.act, v = t.dataset.v;
  if (act==="rolle"){ S.rolle=v; S.tab = v==="traener"?"grupper":"mig"; S.aabenSpiller=null; S.vurderOmraade=null; S.vurderGruppe=null; S.kvartalUdkast=null; render(); }
  else if (act==="tab"){ S.tab=v; S.aabenSpiller=null; S.vurderOmraade=null; S.vurderGruppe=null; S.kvartalUdkast=null; render(); }
  else if (act==="spiller-detalje"){ S.aabenSpiller=v; render(); }
  else if (act==="luk-spiller"){ S.aabenSpiller=null; render(); }
  else if (act==="vurder-omraade"){ S.vurderOmraade=v; render(); }
  else if (act==="luk-omraade"){ S.vurderOmraade=null; S.vurderGruppe=null; render(); }
  else if (act==="vurder-gruppe"){ S.vurderGruppe=v; render(); }
  else if (act==="luk-gruppe"){ S.vurderGruppe=null; render(); }
  else if (act==="score"){ const sp=t.dataset.sp; S.vurderScores[sp] = +v; const d=DATA.spillere[sp]; if(d){ d.dagens={omraade:S.vurderOmraade, score:+v}; d.sidsteTraening="I dag"; } render(); }
  else if (act==="kvartal-gen"){ S.kvartalUdkast=v; render(); }
  else if (act==="luk-kvartal"){ S.kvartalUdkast=null; render(); }
  else if (act==="kvartal-godkend"){ const n=S.kvartalUdkast; const ta=el("evalTekst"); const tekst=(ta&&ta.value)||S.kvartalTekst||""; const d=DATA.spillere[n]; if(d){ d.evalSendt=tekst; d.evalNy=true; } alert("\u2713 Evaluering sendt til "+n.split(" ")[0]+"!\n\nSkift til \ud83c\udfbe Spiller-rollen og se den lande under \u0027Din evaluering\u0027."); S.kvartalUdkast=null; render(); }
  else if (act==="add-ven"){ alert("👋 Venneanmodning sendt til "+v.split(" ")[0]+"!"); }
});
render();
</script>
</body>
</html>
