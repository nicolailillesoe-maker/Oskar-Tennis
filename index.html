// ============ ENGINE-START ============
// Beregner hele tennis-stillingen ud fra point-sekvensen.
// pts: [{r:"V"|"T", å, f}] · oskarFirst: Oskar server først · mtb: 3. sæt = match-tiebreak til 10
function beregnStilling(pts, oskarFirst, mtb, justeringer) {
  if (!Array.isArray(pts)) pts = [];
  if (typeof oskarFirst !== "boolean") oskarFirst = true;
  const jmap = {};
  if (Array.isArray(justeringer)) for (const j of justeringer) { if (j && typeof j.i === "number") jmap[j.i] = j; }
  let setsO = 0, setsM = 0, gO = 0, gM = 0, pO = 0, pM = 0;
  const hist = [];
  let tb = false, tbTo = 7, tbFirst = null, server = oskarFirst;
  let done = false, vinderOskar = null;
  const flags = [];

  const anvendBasis = (b) => {
    setsO = Math.max(0, Math.min(1, b.sO | 0)); setsM = Math.max(0, Math.min(1, b.sM | 0));
    gO = Math.max(0, Math.min(6, b.gO | 0)); gM = Math.max(0, Math.min(6, b.gM | 0));
    pO = 0; pM = 0; server = b.server !== false;
    done = false; vinderOskar = null; tb = false; tbFirst = null; tbTo = 7;
    if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; gO = 0; gM = 0; }
    else if (gO === 6 && gM === 6) { tb = true; tbFirst = server; }
  };

  const tbServer = (first, idx) => (Math.floor((idx + 1) / 2) % 2 === 0 ? first : !first);

  for (let _i = 0; _i < pts.length; _i++) {
    const p = pts[_i];
    if (jmap[_i]) anvendBasis(jmap[_i]);
    if (done) { flags.push({ server, ekstra: true, saet: setsO + setsM + 1 }); continue; }
    const srvNu = tb ? tbServer(tbFirst, pO + pM) : server;

    // Stort-point-analyse FØR bolden spilles
    let stor = null;
    if (tb) {
      const sætEllerMatch = tbTo === 10 || (setsO === 1 && tbTo === 7) || (setsM === 1 && tbTo === 7);
      if (pO >= tbTo - 1 && pO >= pM + 1) stor = (tbTo === 10 || setsO === 1) ? "MATCHBOLD Oskar" : "SÆTBOLD Oskar";
      else if (pM >= tbTo - 1 && pM >= pO + 1) stor = (tbTo === 10 || setsM === 1) ? "MATCHBOLD mod Oskar" : "SÆTBOLD mod Oskar";
      else if (pO === pM && pO >= tbTo - 2) stor = "STORT POINT";
      void sætEllerMatch;
    } else {
      const gpO = pO >= 3 && pO >= pM + 1, gpM = pM >= 3 && pM >= pO + 1;
      if (gpO) {
        const vinderSæt = gO + 1 >= 6 && gO + 1 - gM >= 2;
        stor = vinderSæt && setsO === 1 ? "MATCHBOLD Oskar" : vinderSæt ? "SÆTBOLD Oskar" : srvNu ? "PARTIBOLD Oskar" : "BREAKBOLD Oskar";
      } else if (gpM) {
        const vinderSæt = gM + 1 >= 6 && gM + 1 - gO >= 2;
        stor = vinderSæt && setsM === 1 ? "MATCHBOLD mod Oskar" : vinderSæt ? "SÆTBOLD mod Oskar" : !srvNu ? "PARTIBOLD modst." : "BREAKBOLD mod Oskar";
      } else if (pO === pM && pO >= 2) stor = "STORT POINT (deuce/30-30)";
    }
    flags.push({ server: srvNu, stor, tb, saet: setsO + setsM + 1 });

    // Spil bolden
    if (p.r === "V") pO++; else pM++;

    if (tb) {
      if ((pO >= tbTo || pM >= tbTo) && Math.abs(pO - pM) >= 2) {
        const oVandtTB = pO > pM;
        if (tbTo === 10) { // match-tiebreak = hele 3. sæt
          hist.push([oVandtTB ? 1 : 0, oVandtTB ? 0 : 1, `MTB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        } else {
          if (oVandtTB) gO++; else gM++;
          hist.push([gO, gM, `TB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        }
        gO = 0; gM = 0; pO = 0; pM = 0;
        server = !tbFirst; // modtageren i tiebreaken server først i næste sæt
        tb = false; tbFirst = null; tbTo = 7;
        if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
        else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
      }
    } else {
      const partiVundet = (pO >= 4 || pM >= 4) && Math.abs(pO - pM) >= 2;
      if (partiVundet) {
        if (pO > pM) gO++; else gM++;
        pO = 0; pM = 0; server = !server;
        if (gO >= 6 && gO - gM >= 2 || gM >= 6 && gM - gO >= 2) {
          hist.push([gO, gM, null]);
          if (gO > gM) setsO++; else setsM++;
          gO = 0; gM = 0;
          if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
          else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
        } else if (gO === 6 && gM === 6) { tb = true; tbTo = 7; tbFirst = server; }
      }
    }
  }
  if (jmap[pts.length]) anvendBasis(jmap[pts.length]);
  const nextServer = tb ? tbServer(tbFirst, pO + pM) : server;
  return { setsO, setsM, hist, gO, gM, pO, pM, tb, tbTo, server: nextServer, done, vinderOskar, flags };
}

function statistik(k) {

  const v = k.point.filter(p => p.r === "V").length;

  const uf = k.point.filter(p => p.r === "T" && (p.å === "uf" || p.å === "dobbelt")).length;
  const vindere = k.point.filter(p => p.r === "V" && (p.å === "vinder" || p.å === "es")).length;
  const idxServe = k.point.map((p,i)=>i).filter(i => F[i] && F[i].server === true);
  const oServe = idxServe.map(i => k.point[i]);
  const retur = k.point.filter((p,i) => F[i] && F[i].server === false);
  const oServe1 = oServe.filter(p => p.f === 1);
  const oServe2 = oServe.filter(p => p.f === 2);
  const bpFor = k.point.filter((p,i) => F[i] && F[i].stor && F[i].stor.indexOf("BREAKBOLD Oskar") === 0);
  const bpMod = k.point.filter((p,i) => F[i] && F[i].stor && F[i].stor.indexOf("BREAKBOLD mod") === 0);

  k.point.forEach((p, i) => {
    const sn = (F[i] && F[i].saet) || 1;
    while (perSaet.length < sn) perSaet.push({ v: 0, t: 0, uf: 0, vin: 0, s1: 0, sp: 0, s1v: 0, s2: 0, s2v: 0, df: 0 });
    const ps = perSaet[sn - 1];
    if (p.r === "V") ps.v += 1; else ps.t += 1;
    if (p.r === "T" && (p.å === "uf" || p.å === "dobbelt")) ps.uf += 1;
    if (p.r === "V" && (p.å === "vinder" || p.å === "es")) ps.vin += 1;
    if (p.å === "dobbelt") ps.df += 1;
    if (F[i] && F[i].server === true) {
      ps.sp += 1;
      if (p.f === 1) { ps.s1 += 1; if (p.r === "V") ps.s1v += 1; }
      else { ps.s2 += 1; if (p.r === "V") ps.s2v += 1; }

  const budIVbrud = k.point.filter(p => p.l === 1 && p.r === "T" && (p.å === "uf" || p.å === "dobbelt")).length;
  const oFejl = k.point.filter(p => p.r === "T" && (p.å === "uf" || p.å === "tvunget"));
  const zN = oFejl.filter(p => p.z === 1).length, zL = oFejl.filter(p => p.z === 2).length, zB = oFejl.filter(p => p.z === 3).length;

    serve: [oServe.filter(p=>p.r==="V").length, oServe.length],
    retur: [retur.filter(p=>p.r==="V").length, retur.length],
    s1pct: oServe.length ? Math.round(oServe1.length / oServe.length * 100) : 0,
    s1: [oServe1.filter(p=>p.r==="V").length, oServe1.length],
    s2: [oServe2.filter(p=>p.r==="V").length, oServe2.length],
    df: k.point.filter(p => p.r === "T" && p.å === "dobbelt").length,
    bpFor: [bpFor.filter(p=>p.r==="V").length, bpFor.length],
    bpMod: [bpMod.filter(p=>p.r==="V").length, bpMod.length] };
}

      S.fletAaben = false; S.fletTekst = "";
    } catch (e) { S.fletBesked = "FEJL"; }
    render();
  },
  gendanKoer: () => {
    try {
      const raa = S.gendanTekst.replace("TEAMOSKAR-BACKUP-V1", "").trim();
      const d = JSON.parse(raa);
      if (!d || !Array.isArray(d.kampe)) throw new Error("format");
      S.gemte = d.kampe.map(rensKamp).filter(Boolean);
      S.fysLog = Array.isArray(d.fysLog) ? d.fysLog : [];
      S.ttLog = Array.isArray(d.ttLog) ? d.ttLog : [];
      gemAlle();
      lager.gem("oskar-fysisk-log", JSON.stringify(S.fysLog));
      lager.gem("oskar-tennis-log", JSON.stringify(S.ttLog));
      S.gendanBesked = "OK:" + S.gemte.length + ":" + S.fysLog.length + ":" + S.ttLog.length;
      S.gendanAaben = false; S.gendanTekst = "";
    } catch (e) { S.gendanBesked = "FEJL"; }
    render();
  },
  ttEksport: () => {
    const nye = S.ttLog.filter((e) => !e.x);
    if (!nye.length) { S.ttEks = "(Ingen nye træninger siden sidste eksport — alt er allerede sendt.)"; render(); return; }
    const dm = nye.reduce((a, e) => a + e.m, 0), dk = (nye.reduce((a, e) => a + e.k, 0) / nye.length).toFixed(1);
    const tm = S.ttLog.reduce((a, e) => a + e.m, 0), tk = (S.ttLog.reduce((a, e) => a + e.k, 0) / S.ttLog.length).toFixed(1);
    S.ttEks = "TENNISTRÆNING — Oskar (nyt siden sidste eksport)\n" +
      nye.map((e) => e.d + " · " + e.m + " min · kvalitet " + e.k + "/5" + (e.n ? " · " + e.n : "")).join("\n") +
      "\nDelta: " + nye.length + " træninger · " + (dm / 60).toFixed(1) + " timer · Ø " + dk + "/5" +
      "\nSamlet i appen: " + S.ttLog.length + " træninger · " + (tm / 60).toFixed(1) + " timer · Ø " + tk + "/5";
    S.ttLog.forEach((e) => { e.x = 1; });
    lager.gem("oskar-tennis-log", JSON.stringify(S.ttLog));
    render();
  },
  trykToggle: () => { S.tryk3 = !S.tryk3; S.aarsagValgt = null; S.laengdeValgt = null; lager.gem("oskar-tryk", S.tryk3 ? "3" : "2"); render(); },
  vaelgBenchmark: (b) => { if (BENCHMARKS[b]) { S.benchmark = b; lager.gem("oskar-benchmark", b); render(); } },
  sammenlignToggle: (n) => { const i = S.sammenlign.indexOf(n); if (i >= 0) S.sammenlign.splice(i, 1); else { if (S.sammenlign.length >= 2) S.sammenlign.shift(); S.sammenlign.push(n); } render(); },
  zonerToggle: () => { S.zoner = !S.zoner; S.laengdeValgt = null; lager.gem("oskar-zoner", S.zoner ? "1" : "0"); render(); },
  jAnvend: () => {
    if (!S.aktiv || !S.j) return;
    S.aktiv.justeringer = (S.aktiv.justeringer || []).concat([{ i: S.aktiv.point.length, sO: S.j.sO, sM: S.j.sM, gO: S.j.gO, gM: S.j.gM, server: S.j.server }]);
    S.justAaben = false; gemAktiv(); render();
  },
  laasOp: () => {
    if (hashKode(S.kodeInput) === KODEHASH) { S.laast = false; S.kodeFejl = false; S.kodeInput = ""; lager.gem("oskar-laas", "op"); }
    else { S.kodeFejl = true; }
    render();
  },
  felt: (navn, v) => { S[navn] = v; },
  first: (v) => { S.nyFirst = v === "1"; render(); },
  mtb: (v) => { S.nyMtb = v === "1"; render(); },
  start: () => {
    S.aktiv = { modstander: S.nyMod || "Ukendt modstander", turnering: S.nyTur || "",
      dato: new Date().toISOString().slice(0,10), oskarFirst: S.nyFirst, mtb: S.nyMtb, point: [], justeringer: [] };
    S.afventer = null; S.serv = 1; gemAktiv(); render();
  },
  serv: (v) => { S.serv = +v; render(); },
  udfald: (v) => { S.afventer = v; render(); },
  aarsag: (id) => {
    if (!S.aktiv || !S.afventer) return;
    if (!S.tryk3) {
      if (S.zoner && S.afventer === "tabt" && (id === "uf" || id === "tvunget")) {
        S.aarsagValgt = id; S.laengdeValgt = 0; render(); return;
      }
      S.aktiv.point.push({ r: S.afventer === "vundet" ? "V" : "T", å: id, f: S.serv, l: 0, z: 0 });
      S.afventer = null; S.serv = 1; gemAktiv(); render(); return;
    }
    S.aarsagValgt = id; render();
  },
  laengde: (v) => {
    if (!S.aktiv || !S.afventer || !S.aarsagValgt) return;
    const l = [1,2,3].indexOf(+v) >= 0 ? +v : 0;
    if (S.zoner && S.afventer === "tabt" && (S.aarsagValgt === "uf" || S.aarsagValgt === "tvunget")) {
      S.laengdeValgt = l; render(); return;
    }
    S.aktiv.point.push({ r: S.afventer === "vundet" ? "V" : "T", å: S.aarsagValgt, f: S.serv, l: l, z: 0 });
    S.afventer = null; S.aarsagValgt = null; S.serv = 1; gemAktiv(); render();
  },
  zone: (v) => {
    if (!S.aktiv || !S.afventer || !S.aarsagValgt || S.laengdeValgt === null) return;
    S.aktiv.point.push({ r: "T", å: S.aarsagValgt, f: S.serv, l: S.laengdeValgt, z: [1,2,3].indexOf(+v) >= 0 ? +v : 0 });
    S.afventer = null; S.aarsagValgt = null; S.laengdeValgt = null; S.serv = 1; gemAktiv(); render();
  },
  fortryd: () => {
    if (!S.aktiv) return;
    if (S.laengdeValgt !== null) { S.laengdeValgt = null; if (!S.tryk3) S.aarsagValgt = null; render(); return; }
    if (S.aarsagValgt) { S.aarsagValgt = null; render(); return; }
    if (S.afventer) { S.afventer = null; render(); return; }
    if (S.aktiv.point.length) { S.aktiv.point.pop(); S.serv = 1; gemAktiv(); }
    render();
  },
  afslut: () => {
    if (!S.aktiv) return;
    const st = beregnStilling(S.aktiv.point, S.aktiv.oskarFirst, S.aktiv.mtb, S.aktiv.justeringer);
    const auto = st.hist.map(h => h[2] && h[2].indexOf("MTB") === 0 ? h[2].replace("MTB ","") : h[0]+"-"+h[1]).join(", ");
    S.aktiv.resultat = S.resInput || auto; S.aktiv.afsluttet = true;
    S.gemte.unshift(S.aktiv); gemAlle();
    S.aktiv = null; S.afventer = null; S.resInput = ""; gemAktiv();
    S.tab = "historik"; render();
  },
  eksport: (i) => { S.eksport = lavEksport(S.gemte[+i]); render(); },
  analyseAabn: (i) => { S.redigerA = S.redigerA === +i ? null : +i; S.aTekst = (S.gemte[+i] && S.gemte[+i].analyse) || ""; render(); },
  analyseGem: (i) => { if (S.gemte[+i]) { S.gemte[+i].analyse = S.aTekst; gemAlle(); } S.redigerA = null; S.aTekst = ""; render(); },
  analyseAnnuller: () => { S.redigerA = null; S.aTekst = ""; render(); },
  sletSpoerg: (i) => { S.sletBekraeft = +i; render(); },
  sletFortryd: () => { S.sletBekraeft = null; render(); },
  slet: (i) => { S.gemte.splice(+i, 1); S.sletBekraeft = null; S.eksport = null; gemAlle(); render(); },
};

        '<p style="font-size:11px;color:var(--daempet);margin-top:6px">'+(harData?(EN?"Oskar = all "+kilder.length+" registered matches (set columns = sums across matches). ":"Oskar = alle "+kilder.length+" registrerede kampe (sæt-kolonner = summeret på tværs). "):(EN?"⚠ The whole table is the example match until the first real match is saved. ":"⚠ Hele tabellen er eksempel-kampen, indtil første rigtige kamp gemmes. "))+(EN?((typeof BENCHMARKS!=="undefined"&&S&&BENCHMARKS[S.benchmark])?BENCHMARKS[S.benchmark].navn:"Sinner")+" = ATP 2025/26 (rounded). Benchmarks, not verdicts — the DIRECTION counts. Set 1 vs set 2 reveals whether the level holds when the match gets long.":((typeof BENCHMARKS!=="undefined"&&S&&BENCHMARKS[S.benchmark])?BENCHMARKS[S.benchmark].navn:"Sinner")+" = ATP 2025/26 (afrundet). Pejlemærker, ikke facit — det er RETNINGEN, der tæller. Sæt 1 mod sæt 2 afslører, om niveauet holder, når kampen bliver lang.")+'</p></div>';
    })();
    h += '<div class="kort" style="background:#121F2E;border:1.5px solid var(--kant)"><div style="font-weight:800;font-size:13.5px;color:var(--is);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">📊 Baseline — før appen (rangliste uge 28 + UM)</div>' +
      BASELINE.grupper.map(g => '<div style="margin-bottom:9px"><div style="font-weight:800;font-size:12.5px">'+esc(g[0])+' · <span style="color:var(--guld);font-weight:700">'+esc(g[1])+'</span></div><div style="font-size:12px;color:#B9C6D2;line-height:1.55">'+esc(g[2])+'</div></div>').join("") +
      '<div style="font-weight:800;font-size:12px;color:var(--daempet);margin:10px 0 4px;text-transform:uppercase">Kendte kampe med score (UM-ugen)</div>' +
      BASELINE.kendteKampe.map(k => '<div style="display:flex;gap:8px;font-size:11.5px;padding:3px 0;border-bottom:1px dashed #1E2E3F;align-items:baseline"><span style="color:'+(k[0]==="V"?"var(--vundet)":"var(--tabt)")+';font-weight:800;width:12px">'+k[0]+'</span><span style="flex:1">'+esc(k[1])+'</span><span style="font-weight:700;white-space:nowrap">'+esc(k[2])+'</span></div>').join("") +
      '<div style="margin-top:8px">' + BASELINE.noegletal.map(n => '<div style="font-size:11.5px;color:#B9C6D2;line-height:1.55;margin-bottom:4px">• '+esc(n)+'</div>').join("") + '</div></div>';
    if (!S.gemte.length) h += '<p style="font-size:13px;color:var(--daempet)">'+(EN?'New matches with point-by-point data are recorded under 🎾 Match and collected here: per-match statistics and development over time.':'Nye kampe med point-for-point data registreres under 🎾 Kamp og lander her under baselinen.')+'</p>';
    h += S.gemte.map((k,i) => {
      const s = statistik(k);
      return '<div class="kort"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><b style="font-size:13.5px">vs '+esc(k.modstander)+(k.resultat?' <span style="color:var(--is)">· '+esc(k.resultat)+'</span>':'')+'</b><span style="font-size:11px;color:var(--daempet)">'+esc(k.dato)+'</span></div>' +
        (k.turnering?'<p style="margin:2px 0 2px;font-size:11px;color:var(--daempet)">'+esc(k.turnering)+'</p>':'')+statTabel(s,EN)+saetTabel(s,EN)+
        '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="knap" style="flex:none;padding:8px 14px;background:transparent;border:1.5px solid var(--is);color:var(--is);font-size:12px" data-a="eksport" data-v="'+i+'">📤 '+(EN?"Export to Claude":"Eksportér til Claude")+'</button>' +
        '<button class="knap" style="flex:none;padding:8px 12px;background:transparent;border:1.5px solid var(--guld);color:var(--guld);font-size:12px" data-a="analyseAabn" data-v="'+i+'">📝 '+(k.analyse?(EN?"Analysis ✓":"Analyse ✓"):(EN?"Analysis":"Analyse"))+'</button>' +
        (S.sletBekraeft === i
          ? '<button class="knap" style="flex:none;padding:8px 14px;background:var(--tabt);font-size:12px" data-a="slet" data-v="'+i+'">'+(EN?"Delete PERMANENTLY":"Slet PERMANENT")+'</button><button class="knap" style="flex:none;padding:8px 12px;background:transparent;border:1.5px solid var(--kant);color:var(--daempet);font-size:12px" data-a="sletFortryd">'+(EN?"Cancel":"Fortryd")+'</button>'
          : '<button class="knap" style="flex:none;padding:8px 12px;background:transparent;border:1.5px solid var(--tabt);color:var(--tabt);font-size:12px" data-a="sletSpoerg" data-v="'+i+'">🗑 '+(EN?"Delete":"Slet")+'</button>') +
        '</div></div>';
    }).join("");
    if (S.redigerA !== null && S.gemte[S.redigerA]) {
      h += '<p class="lille" style="margin-top:10px">'+(EN?"Claude\'s analysis of the match vs ":"Claudes analyse af kampen mod ")+esc(S.gemte[S.redigerA].modstander)+(EN?" — paste from the chat:":" — indsæt fra chatten:")+'</p>';
      h += '<textarea data-felt="aTekst" placeholder="'+(EN?'Paste the analysis here…':'Indsæt analysen her…')+'" style="height:120px;border-color:var(--guld);color:var(--kridt)">'+esc(S.aTekst)+'</textarea>';
      h += '<div class="raekke" style="margin-top:6px"><button class="knap" style="background:var(--grus)" data-a="analyseGem" data-v="'+S.redigerA+'">💾 '+(EN?"Save analysis to match":"Gem analysen på kampen")+'</button><button class="knap" data-a="analyseAnnuller">'+(EN?"Cancel":"Annullér")+'</button></div>';
    }
    h += '<h2 style="font-size:15px;color:var(--is);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">💾 '+(EN?"Backup":"Sikkerhedskopi")+'</h2>' +
      '<div class="raekke"><button class="knap" style="background:transparent;border:1.5px solid var(--is);color:var(--is)" data-a="backupLav">💾 '+(EN?"Create full backup":"Lav fuld backup")+'</button><button class="knap" style="background:transparent;border:1.5px solid var(--kant);color:var(--daempet)" data-a="gendanToggle">♻️ '+(EN?"Restore":"Gendan")+'</button><button class="knap" style="background:transparent;border:1.5px solid var(--vundet);color:var(--vundet)" data-a="fletToggle">'+(EN?"🔀 Merge device":"🔀 Flet enhed")+'</button></div>';
    if (S.backupTekst) h += '<p class="lille">'+(EN?"Copy this text and save it in the family chat/notes — it contains ALL matches and training data on this device:":"Kopiér teksten og gem den i familiegruppen/noter — den indeholder ALLE kampe og træningsdata på denne enhed:")+'</p><textarea readonly onfocus="this.select()" style="height:90px">'+esc(S.backupTekst)+'</textarea>' + eksportKnapper('backupTekst', EN);
    if (S.gendanAaben) {
      h += '<p class="lille">'+(EN?"Paste a backup text below. NOTE: restoring REPLACES all data on this device.":"Indsæt en backup-tekst herunder. OBS: Gendannelse ERSTATTER alle data på denne enhed.")+'</p>' +
        '<textarea data-felt="gendanTekst" placeholder="TEAMOSKAR-BACKUP-V1 ..." style="height:80px;color:var(--kridt)">'+esc(S.gendanTekst)+'</textarea>' +
        '<div class="raekke" style="margin-top:6px"><button class="knap" style="background:var(--tabt)" data-a="gendanKoer">'+(EN?"Restore — REPLACES current data":"Gendan — ERSTATTER nuværende data")+'</button></div>';
    }
    if (S.fletAaben) {
      h += '<p class="lille" style="margin-top:8px">'+(EN?"Paste an export/backup from ANOTHER phone. Matches are MERGED in (duplicates skipped) — nothing is deleted.":"Indsæt en eksport/backup fra en ANDEN telefon. Kampene FLETTES ind (dubletter springes over) — intet slettes.")+'</p>' +
        '<textarea data-felt="fletTekst" placeholder="TEAMOSKAR-BACKUP-V1 ..." style="height:80px;color:var(--kridt)">'+esc(S.fletTekst)+'</textarea>' +
        '<div class="raekke" style="margin-top:6px"><button class="knap" style="background:var(--vundet);color:#0B141D" data-a="fletKoer">'+(EN?"🔀 Merge in":"🔀 Flet ind")+'</button></div>';
    }
    if (S.fletBesked && S.fletBesked.indexOf("OK") === 0) h += '<p class="lille" style="color:var(--vundet);font-weight:700">'+(EN?"Merged in "+S.fletBesked.split(":")[1]+" new matches ✓":"Flettede "+S.fletBesked.split(":")[1]+" nye kampe ind ✓")+'</p>';
    if (S.fletBesked === "FEJL") h += '<p class="lille" style="color:var(--tabt);font-weight:700">'+(EN?"Could not read that text.":"Kunne ikke læse teksten.")+'</p>';
    if (S.gendanBesked === "FEJL") h += '<p class="lille" style="color:var(--tabt);font-weight:700">'+(EN?"Could not read the backup text — check that everything was copied.":"Kunne ikke læse backup-teksten — tjek at alt kom med.")+'</p>';
    if (S.gendanBesked && S.gendanBesked.indexOf("OK:") === 0) { const t = S.gendanBesked.split(":"); h += '<p class="lille" style="color:var(--vundet);font-weight:700">'+(EN?"Restored: ":"Gendannet: ")+t[1]+' '+(EN?"matches":"kampe")+' · '+t[2]+' '+(EN?"running sessions":"løbepas")+' · '+t[3]+' '+(EN?"tennis sessions":"tennistræninger")+'</p>'; }
    if (S.eksport) h += '<p class="lille" style="margin-top:10px">'+(EN?"Select, copy and send to Nicolai/Claude:":"Markér, kopiér og send til Nicolai/Claude:")+'</p><textarea readonly onfocus="this.select()">'+esc(S.eksport)+'</textarea>' + eksportKnapper('eksport', EN);
  }

  if (!LAAST && S.tab === "status") {
    h += '<div class="raekke"><div class="kort" style="flex:1;text-align:center;margin-bottom:0"><div style="font-size:26px;font-weight:800;color:var(--guld)">'+PROFIL.u14rang+'.</div><div style="font-size:11px;color:var(--daempet)">'+(EN?"U14 Boys (of ":"U14 Drenge (af ")+PROFIL.u14af+')</div><div style="font-weight:700;margin-top:2px">'+PROFIL.u14pt+' pt</div></div>' +
         '<div class="kort" style="flex:1;text-align:center;margin-bottom:0"><div style="font-size:26px;font-weight:800">'+PROFIL.seniorrang+'.</div><div style="font-size:11px;color:var(--daempet)">'+(EN?"Senior ranking":"Seniorranglisten")+'</div><div style="font-weight:700;margin-top:2px">WTN '+PROFIL.wtn+'</div></div></div>';
    h += '<p class="lille" style="margin:8px 0 12px">'+(EN?PROFIL_EN.fordeling:PROFIL.fordeling)+(EN?". Behind: ":". Bagved: ")+(EN?PROFIL_EN.bagved:PROFIL.bagved)+(EN?" pts. Ahead: ":" pt. Foran: ")+(EN?PROFIL_EN.foran:PROFIL.foran)+(EN?" pts.":" pt.")+'</p>';
    h += '<h2 style="font-size:15px;color:var(--is);margin:0 0 8px;text-transform:uppercase;letter-spacing:1px">'+(EN?"The 10 counting results":"De 10 tællende resultater")+'</h2>';
    h += (EN?TAELLENDE_EN:TAELLENDE).map(function(t,i){ return '<div class="kort" style="display:flex;gap:10px;align-items:center;padding:8px 12px;border-left:3px solid '+(t[3]?"var(--tabt)":"transparent")+'"><span style="font-weight:800;color:var(--daempet);width:22px;font-size:12px">'+(i+1)+'.</span><div style="flex:1"><div style="font-size:12.5px;font-weight:600">'+esc(t[0])+'</div><div style="font-size:10.5px;color:'+(t[3]?"var(--tabt)":"var(--daempet)")+'">'+(t[3]?(EN?"⏳ expires ":"⏳ udløber "):(EN?"Expires ":"Udløber "))+esc(t[2])+'</div></div><span style="font-weight:800;font-size:13.5px;color:var(--guld)">'+t[1]+'</span></div>'; }).join("");
    h += '<h2 style="font-size:15px;color:var(--is);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">'+(EN?"Insights":"Indsigter")+'</h2>' + (EN?INDSIGTER_EN:INDSIGTER).map(function(x){ return '<div class="kort"><p>'+esc(x)+'</p></div>'; }).join("");
  }
  if (!LAAST && S.tab === "strategi") {
    h += '<p class="lille">'+(EN?"Six principles from the Danish federation\'s points rules — the foundation of the season plan.":"Seks principper fra DTF\'s pointregler — fundamentet under sæsonplanen.")+'</p>' + (EN?STRATEGI_EN:STRATEGI).map(function(r){ return '<div class="kort"><h3>'+r[0]+' '+esc(r[1])+'</h3><p>'+esc(r[2])+'</p></div>'; }).join("") +
         '<p class="lille">'+(EN?'Point scenarios ("what does a Cat. G quarterfinal move?") are computed in the chat with Claude.':'Point-scenarier ("hvad flytter en G-kvartfinale?") regnes i chatten med Claude.')+'</p>';
  }
  if (!LAAST && S.tab === "plan") {
    const fokus = ugensFokus(EN);
    if (fokus) {
      h += '<div class="kort" style="border:1.5px solid var(--grus);background:linear-gradient(90deg,rgba(200,90,40,.12),transparent 60%)">' +
        '<div style="font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--grus);margin-bottom:4px">🎯 '+(EN?"THIS WEEK\'S FOCUS":"UGENS FOKUS")+'</div>' +
        '<div style="font-size:15px;font-weight:800;line-height:1.4">'+fokus+'</div></div>';
    }
    h += (EN?PLAN_EN:PLAN).map(function(u, i){
      var inde = u[2].indexOf("HOVEDRUNDEN")>=0 || u[2].indexOf("MAIN DRAW")>=0 || u[2].indexOf("INDE")>=0;
      var farve = (inde||u[2].indexOf("TILMELDT")>=0||u[2].indexOf("ENTERED")>=0) ? "var(--vundet)" : (u[2].indexOf("SKAL")>=0||u[2].indexOf("MUST")>=0) ? "var(--tabt)" : u[2].indexOf("★")>=0 ? "var(--guld)" : "var(--kant)";
      var aaben = S.planAaben === i;
      var ikonMatch = u[1].match(/^([\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}])/u);
      var ikon = ikonMatch ? ikonMatch[1] : (u[4] === "TE" ? "🌍" : u[4] === "H" ? "🛡" : u[4] === "1" ? "🎯" : "🗓");
      var titel = u[1].replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]\s*/u, "");
      var statusKort = inde
        ? '<span style="font-size:10px;font-weight:800;background:var(--vundet);color:#0B141D;padding:2px 8px;border-radius:10px;white-space:nowrap">'+(EN?"IN":"INDE")+'</span>'
        : (u[2].indexOf("TILMELDT")>=0||u[2].indexOf("ENTERED")>=0) ? '<span style="font-size:12px;color:var(--vundet)">✅</span>'
        : u[2].indexOf("★")>=0 ? '<span style="font-size:12px;color:var(--guld)">★</span>'
        : (u[2].indexOf("SKAL")>=0||u[2].indexOf("MUST")>=0) ? '<span style="font-size:12px;color:var(--tabt)">🚨</span>' : '';
      var rk = '<div class="kort" data-a="planToggle" data-v="'+i+'" style="cursor:pointer;padding:11px 13px;border-left:3px solid '+farve+(inde?';background:linear-gradient(90deg,rgba(74,157,107,.14),transparent 55%)':'')+'">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
        '<span style="font-size:20px;flex:none">'+ikon+'</span>' +
        '<div style="flex:1;min-width:0">' +
        '<div style="font-size:10.5px;font-weight:800;letter-spacing:.5px;color:var(--daempet)">'+esc(u[0]).toUpperCase()+'</div>' +
        '<div style="font-size:13px;font-weight:700;white-space:'+(aaben?'normal':'nowrap')+';overflow:hidden;text-overflow:ellipsis">'+esc(titel)+'</div>' +
        '</div>' + statusKort +
        '<span style="color:var(--daempet);font-size:11px;flex:none">'+(aaben?'▲':'▼')+'</span></div>';
      if (aaben) {
        rk += '<div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--kant)">' +
          '<div style="font-size:11px;font-weight:800;color:'+farve+';margin-bottom:4px">'+esc(u[2])+'</div>' +
          '<p style="font-size:12px;margin:0;line-height:1.65;color:#B9C6D2">'+esc(u[3])+'</p></div>';
      }
      return rk + '</div>';
    }).join("");
    h += '<p class="lille" style="margin-top:10px">'+(EN?"Tap a row for details. 🎾 IN = place confirmed · ✅ = entered · ★ = top priority · 🚨 = must play.":"Tryk på en række for detaljer. 🎾 INDE = plads bekræftet · ✅ = tilmeldt · ★ = hovedprioritet · 🚨 = skal spilles.")+'</p>';
  }
  if (!LAAST && S.tab === "regler") {
    h += (EN?REGLER_EN:REGLER).map(function(r){ return '<div style="display:flex;gap:8px;margin-bottom:9px;font-size:12.5px;line-height:1.6;color:#B9C6D2"><span style="color:var(--gruslys);font-weight:800">§</span><span>'+esc(r)+'</span></div>'; }).join("") +
         '<a href="https://dtf.tournamentsoftware.com/ranking/category.aspx?id=52585&amp;category=2531" target="_blank" rel="noopener noreferrer" style="display:block;text-align:center;background:var(--grus);color:var(--kridt);font-weight:700;font-size:13px;border-radius:8px;padding:12px 0;text-decoration:none;margin-top:12px">📊 '+(EN?"Oskar\'s current DTF ranking":"Oskars aktuelle rangliste hos DTF")+'</a>';
  }

  h += '<p class="fod">'+(EN?"Data is stored locally in the browser on this device. Analyses and updates: send the export to Claude via Nicolai. Team Oskar · July 2026.":"Data gemmes lokalt i browseren på denne enhed. Analyser og opdateringer: send eksporten til Claude via Nicolai. Team Oskar · v1.5.1 · benchmark helt konsistent · juli 2026.")+'</p>';
  el.innerHTML = h;
}

document.getElementById("app").addEventListener("click", (e) => {
  const b = e.target.closest("[data-a]");
  if (b) A[b.dataset.a](b.dataset.v);
});
document.getElementById("app").addEventListener("input", (e) => {
  const f = e.target.dataset.felt;
  if (f) S[f] = e.target.value;
});
render();
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(function(){ /* offline-cache er valgfri */ });
}
</script>
