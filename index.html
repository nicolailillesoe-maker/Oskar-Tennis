// ============ ENGINE-START ============
// Beregner hele tennis-stillingen ud fra point-sekvensen.
// pts: [{r:"V"|"T", å, f}] · oskarFirst: Oskar server først · mtb: 3. sæt = match-tiebreak til 10
function beregnStilling(pts, oskarFirst, mtb) {
  if (!Array.isArray(pts)) pts = [];
  if (typeof oskarFirst !== "boolean") oskarFirst = true;
  let setsO = 0, setsM = 0, gO = 0, gM = 0, pO = 0, pM = 0;
  const hist = [];
  let tb = false, tbTo = 7, tbFirst = null, server = oskarFirst;
  let done = false, vinderOskar = null;
  const flags = [];

  const tbServer = (first, idx) => (Math.floor((idx + 1) / 2) % 2 === 0 ? first : !first);

  for (const p of pts) {
    if (done) { flags.push({ server, ekstra: true }); continue; }
    const srvNu = tb ? tbServer(tbFirst, pO + pM) : server;

    // Stort-point-analyse FØR bolden spilles
    let stor = null;
    if (tb) {
      const sætEllerMatch = tbTo === 10 || (setsO === 1 && tbTo === 7) || (setsM === 1 && tbTo === 7);
      if (pO >= tbTo - 1 && pO >= pM + 1) stor = (tbTo === 10 || setsO === 1) ? "MATCHBOLD Oskar" : "SÆTBOLD Oskar";
      else if (pM >= tbTo - 1 && pM >= pO + 1) stor = (tbTo === 10 || setsM === 1) ? "MATCHBOLD mod Oskar" : "SÆTBOLD mod Oskar";
      else if (pO === pM && pO >= tbTo - 2) stor = "STORT POINT";
      void sætEllerMatch;
    } else {
      const gpO = pO >= 3 && pO >= pM + 1, gpM = pM >= 3 && pM >= pO + 1;
      if (gpO) {
        const vinderSæt = gO + 1 >= 6 && gO + 1 - gM >= 2;
        stor = vinderSæt && setsO === 1 ? "MATCHBOLD Oskar" : vinderSæt ? "SÆTBOLD Oskar" : srvNu ? "PARTIBOLD Oskar" : "BREAKBOLD Oskar";
      } else if (gpM) {
        const vinderSæt = gM + 1 >= 6 && gM + 1 - gO >= 2;
        stor = vinderSæt && setsM === 1 ? "MATCHBOLD mod Oskar" : vinderSæt ? "SÆTBOLD mod Oskar" : !srvNu ? "PARTIBOLD modst." : "BREAKBOLD mod Oskar";
      } else if (pO === pM && pO >= 2) stor = "STORT POINT (deuce/30-30)";
    }
    flags.push({ server: srvNu, stor, tb });

    // Spil bolden
    if (p.r === "V") pO++; else pM++;

    if (tb) {
      if ((pO >= tbTo || pM >= tbTo) && Math.abs(pO - pM) >= 2) {
        const oVandtTB = pO > pM;
        if (tbTo === 10) { // match-tiebreak = hele 3. sæt
          hist.push([oVandtTB ? 1 : 0, oVandtTB ? 0 : 1, `MTB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        } else {
          if (oVandtTB) gO++; else gM++;
          hist.push([gO, gM, `TB ${pO}-${pM}`]);
          if (oVandtTB) setsO++; else setsM++;
        }
        gO = 0; gM = 0; pO = 0; pM = 0;
        server = !tbFirst; // modtageren i tiebreaken server først i næste sæt
        tb = false; tbFirst = null; tbTo = 7;
        if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
        else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
      }
    } else {
      const partiVundet = (pO >= 4 || pM >= 4) && Math.abs(pO - pM) >= 2;
      if (partiVundet) {
        if (pO > pM) gO++; else gM++;
        pO = 0; pM = 0; server = !server;
        if (gO >= 6 && gO - gM >= 2 || gM >= 6 && gM - gO >= 2) {
          hist.push([gO, gM, null]);
          if (gO > gM) setsO++; else setsM++;
          gO = 0; gM = 0;
          if (setsO === 2 || setsM === 2) { done = true; vinderOskar = setsO === 2; }
          else if (setsO === 1 && setsM === 1 && mtb) { tb = true; tbTo = 10; tbFirst = server; }
        } else if (gO === 6 && gM === 6) { tb = true; tbTo = 7; tbFirst = server; }
      }
    }
  }
  const nextServer = tb ? tbServer(tbFirst, pO + pM) : server;
  return { setsO, setsM, hist, gO, gM, pO, pM, tb, tbTo, server: nextServer, done, vinderOskar, flags };
}

  gem: (k, v) => { try { window.localStorage.setItem(k, v); } catch (e) { MEM[k] = v; } },

const rensKamp = (g) => {
  if (g && g.kamp) g = g.kamp; // v1-format
  if (!g || !Array.isArray(g.point)) return null;
  return { modstander: g.modstander || "Ukendt modstander", turnering: g.turnering || "",

// ---------- Statistik ----------
function statistik(k) {
  const st = beregnStilling(k.point, k.oskarFirst, k.mtb);
  const F = st.flags;
  const v = k.point.filter(p => p.r === "V").length;
  const t = k.point.length - v;
  const uf = k.point.filter(p => p.r === "T" && (p.å === "uf" || p.å === "dobbelt")).length;
  const vindere = k.point.filter(p => p.r === "V" && (p.å === "vinder" || p.å === "es")).length;
  const idxServe = k.point.map((p,i)=>i).filter(i => F[i] && F[i].server === true);
  const oServe = idxServe.map(i => k.point[i]);
  const retur = k.point.filter((p,i) => F[i] && F[i].server === false);
  const oServe1 = oServe.filter(p => p.f === 1);
  const oServe2 = oServe.filter(p => p.f === 2);
  const bpFor = k.point.filter((p,i) => F[i] && F[i].stor && F[i].stor.indexOf("BREAKBOLD Oskar") === 0);
  const bpMod = k.point.filter((p,i) => F[i] && F[i].stor && F[i].stor.indexOf("BREAKBOLD mod") === 0);
  return { st, v, t, uf, vindere,
    serve: [oServe.filter(p=>p.r==="V").length, oServe.length],
    retur: [retur.filter(p=>p.r==="V").length, retur.length],
    s1pct: oServe.length ? Math.round(oServe1.length / oServe.length * 100) : 0,
    s1: [oServe1.filter(p=>p.r==="V").length, oServe1.length],
    s2: [oServe2.filter(p=>p.r==="V").length, oServe2.length],
    df: k.point.filter(p => p.r === "T" && p.å === "dobbelt").length,
    bpFor: [bpFor.filter(p=>p.r==="V").length, bpFor.length],
    bpMod: [bpMod.filter(p=>p.r==="V").length, bpMod.length] };
}

function lavEksport(k) {
  const s = statistik(k);
  return [
    "KAMP: Oskar vs " + k.modstander + " · " + k.turnering + " · " + k.dato + " · resultat: " + (k.resultat || "?"),
    "Point: " + s.v + "-" + s.t + " (" + k.point.length + " bolde) · Sæt: " + s.st.hist.map(h => h[2] ? h[0]+"-"+h[1]+" ("+h[2]+")" : h[0]+"-"+h[1]).join(", "),
    "Oskars serv: " + s.serve[0] + "/" + s.serve[1] + " · 1. serv i spil: " + s.s1pct + " % · vundet på 1. serv: " + s.s1[0] + "/" + s.s1[1] + " · på 2. serv: " + s.s2[0] + "/" + s.s2[1] + " · dobbeltfejl: " + s.df,
    "Retur: " + s.retur[0] + "/" + s.retur[1] + " · Breakbolde udnyttet: " + s.bpFor[0] + "/" + s.bpFor[1] + " · afværget: " + s.bpMod[0] + "/" + s.bpMod[1],
    "Vindere+es: " + s.vindere + " · Gratis fejl (inkl. df): " + s.uf,
    "Rå sekvens (V/T:årsag:serv): " + k.point.map(p => p.r + ":" + p.å + ":" + p.f).join(" "),
    "(Oskar servede først: " + (k.oskarFirst ? "ja" : "nej") + " · 3. sæt = MTB: " + (k.mtb ? "ja" : "nej") + ")",
  ].join("\n");
}

const A = {

  mtb: (v) => { S.nyMtb = v === "1"; render(); },
  start: () => {
    S.aktiv = { modstander: S.nyMod || "Ukendt modstander", turnering: S.nyTur || "",
      dato: new Date().toISOString().slice(0,10), oskarFirst: S.nyFirst, mtb: S.nyMtb, point: [] };
    S.afventer = null; S.serv = 1; gemAktiv(); render();
  },
  serv: (v) => { S.serv = +v; render(); },
  udfald: (v) => { S.afventer = v; render(); },
  aarsag: (id) => {
    if (!S.aktiv || !S.afventer) return;
    S.aktiv.point.push({ r: S.afventer === "vundet" ? "V" : "T", å: id, f: S.serv });
    S.afventer = null; S.serv = 1; gemAktiv(); render();
  },
  fortryd: () => {
    if (!S.aktiv) return;
    if (S.afventer) { S.afventer = null; render(); return; }
    if (S.aktiv.point.length) { S.aktiv.point.pop(); S.serv = 1; gemAktiv(); }
    render();
  },
  afslut: () => {
    if (!S.aktiv) return;
    const st = beregnStilling(S.aktiv.point, S.aktiv.oskarFirst, S.aktiv.mtb);
    const auto = st.hist.map(h => h[2] && h[2].indexOf("MTB") === 0 ? h[2].replace("MTB ","") : h[0]+"-"+h[1]).join(", ");
    S.aktiv.resultat = S.resInput || auto; S.aktiv.afsluttet = true;
    S.gemte.unshift(S.aktiv); gemAlle();
    S.aktiv = null; S.afventer = null; S.resInput = ""; gemAktiv();
    S.tab = "historik"; render();
  },
  eksport: (i) => { S.eksport = lavEksport(S.gemte[+i]); render(); },
  analyseAabn: (i) => { S.redigerA = S.redigerA === +i ? null : +i; S.aTekst = (S.gemte[+i] && S.gemte[+i].analyse) || ""; render(); },
  analyseGem: (i) => { if (S.gemte[+i]) { S.gemte[+i].analyse = S.aTekst; gemAlle(); } S.redigerA = null; S.aTekst = ""; render(); },
  analyseAnnuller: () => { S.redigerA = null; S.aTekst = ""; render(); },
  sletSpoerg: (i) => { S.sletBekraeft = +i; render(); },
  sletFortryd: () => { S.sletBekraeft = null; render(); },
  slet: (i) => { S.gemte.splice(+i, 1); S.sletBekraeft = null; S.eksport = null; gemAlle(); render(); },
};

    [["🎾 Single",SINGLE26],["👥 Double",DOUBLE26],["🤝 Mix",MIX26]].forEach(function(par){
      h += '<h2 style="font-size:15px;color:var(--is);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">'+par[0]+'</h2>';
      h += par[1].map(function(r){ return '<div class="kort" style="display:flex;gap:10px;align-items:baseline;padding:10px 13px"><span style="font-size:10.5px;color:var(--daempet);width:46px;flex-shrink:0">uge '+r[1]+'</span><div style="flex:1"><div style="font-weight:700;font-size:12.5px">'+esc(r[0])+'</div><p style="font-size:12px">'+esc(r[2])+'</p></div><span style="font-weight:800;font-size:12.5px;white-space:nowrap;color:'+(r[3]!=="0"&&r[3]!=="—"?"var(--guld)":"var(--daempet)")+'">'+r[3]+(r[3]!=="—"?" pt":"")+'</span></div>'; }).join("");
    });
    h += '<h2 style="font-size:15px;color:var(--is);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">Hvad tallene siger</h2>' + STAT26.map(function(x){ return '<div class="kort"><p>'+esc(x)+'</p></div>'; }).join("");
  }

  if (S.tab === "historik") {
    h += '<div class="kort" style="background:#121F2E;border:1.5px solid var(--kant)"><div style="font-weight:800;font-size:13.5px;color:var(--is);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">📊 Baseline — før appen (rangliste uge 28 + UM)</div>' +
      BASELINE.grupper.map(g => '<div style="margin-bottom:9px"><div style="font-weight:800;font-size:12.5px">'+esc(g[0])+' · <span style="color:var(--guld);font-weight:700">'+esc(g[1])+'</span></div><div style="font-size:12px;color:#B9C6D2;line-height:1.55">'+esc(g[2])+'</div></div>').join("") +
      '<div style="font-weight:800;font-size:12px;color:var(--daempet);margin:10px 0 4px;text-transform:uppercase">Kendte kampe med score (UM-ugen)</div>' +
      BASELINE.kendteKampe.map(k => '<div style="display:flex;gap:8px;font-size:11.5px;padding:3px 0;border-bottom:1px dashed #1E2E3F;align-items:baseline"><span style="color:'+(k[0]==="V"?"var(--vundet)":"var(--tabt)")+';font-weight:800;width:12px">'+k[0]+'</span><span style="flex:1">'+esc(k[1])+'</span><span style="font-weight:700;white-space:nowrap">'+esc(k[2])+'</span></div>').join("") +
      '<div style="margin-top:8px">' + BASELINE.noegletal.map(n => '<div style="font-size:11.5px;color:#B9C6D2;line-height:1.55;margin-bottom:4px">• '+esc(n)+'</div>').join("") + '</div></div>';
    if (!S.gemte.length) h += '<p style="font-size:13px;color:var(--daempet)">Nye kampe med point-for-point data registreres under 🎾 Kamp og lander her under baselinen.</p>';
    h += S.gemte.map((k,i) => {
      const s = statistik(k);
      return '<div class="kort"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><b style="font-size:13.5px">vs '+esc(k.modstander)+(k.resultat?' <span style="color:var(--is)">· '+esc(k.resultat)+'</span>':'')+'</b><span style="font-size:11px;color:var(--daempet)">'+esc(k.dato)+'</span></div>' +
        '<p style="margin:4px 0 8px">'+(k.turnering?esc(k.turnering)+' · ':'')+'Point '+s.v+'-'+s.t+' · Serve '+s.serve[0]+'/'+s.serve[1]+' (1. serv '+s.s1pct+' %) · BP '+s.bpFor[0]+'/'+s.bpFor[1]+' · Vindere '+s.vindere+' · Gratis fejl '+s.uf+'</p>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="knap" style="flex:none;padding:8px 14px;background:transparent;border:1.5px solid var(--is);color:var(--is);font-size:12px" data-a="eksport" data-v="'+i+'">📤 Eksportér til Claude</button>' +
        '<button class="knap" style="flex:none;padding:8px 12px;background:transparent;border:1.5px solid var(--guld);color:var(--guld);font-size:12px" data-a="analyseAabn" data-v="'+i+'">📝 '+(k.analyse?"Analyse ✓":"Analyse")+'</button>' +
        (S.sletBekraeft === i
          ? '<button class="knap" style="flex:none;padding:8px 14px;background:var(--tabt);font-size:12px" data-a="slet" data-v="'+i+'">Slet PERMANENT</button><button class="knap" style="flex:none;padding:8px 12px;background:transparent;border:1.5px solid var(--kant);color:var(--daempet);font-size:12px" data-a="sletFortryd">Fortryd</button>'
          : '<button class="knap" style="flex:none;padding:8px 12px;background:transparent;border:1.5px solid var(--tabt);color:var(--tabt);font-size:12px" data-a="sletSpoerg" data-v="'+i+'">🗑 Slet</button>') +
        '</div></div>';
    }).join("");
    if (S.redigerA !== null && S.gemte[S.redigerA]) {
      h += '<p class="lille" style="margin-top:10px">Claudes analyse af kampen mod '+esc(S.gemte[S.redigerA].modstander)+' — indsæt fra chatten:</p>';
      h += '<textarea data-felt="aTekst" placeholder="Indsæt analysen her…" style="height:120px;border-color:var(--guld);color:var(--kridt)">'+esc(S.aTekst)+'</textarea>';
      h += '<div class="raekke" style="margin-top:6px"><button class="knap" style="background:var(--grus)" data-a="analyseGem" data-v="'+S.redigerA+'">💾 Gem analysen på kampen</button><button class="knap" data-a="analyseAnnuller">Annullér</button></div>';
    }
    if (S.eksport) h += '<p class="lille" style="margin-top:10px">Markér, kopiér og send til Nicolai/Claude:</p><textarea readonly onfocus="this.select()">'+esc(S.eksport)+'</textarea>';
  }

  if (S.tab === "status") {
    h += '<div class="raekke"><div class="kort" style="flex:1;text-align:center;margin-bottom:0"><div style="font-size:26px;font-weight:800;color:var(--guld)">'+PROFIL.u14rang+'.</div><div style="font-size:11px;color:var(--daempet)">U14 Drenge (af '+PROFIL.u14af+')</div><div style="font-weight:700;margin-top:2px">'+PROFIL.u14pt+' pt</div></div>' +
         '<div class="kort" style="flex:1;text-align:center;margin-bottom:0"><div style="font-size:26px;font-weight:800">'+PROFIL.seniorrang+'.</div><div style="font-size:11px;color:var(--daempet)">Seniorranglisten</div><div style="font-weight:700;margin-top:2px">WTN '+PROFIL.wtn+'</div></div></div>';
    h += '<p class="lille" style="margin:8px 0 12px">'+PROFIL.fordeling+'. Bagved: '+PROFIL.bagved+' pt. Foran: '+PROFIL.foran+' pt.</p>';
    h += '<h2 style="font-size:15px;color:var(--is);margin:0 0 8px;text-transform:uppercase;letter-spacing:1px">De 10 tællende resultater</h2>';
    h += TAELLENDE.map(function(t,i){ return '<div class="kort" style="display:flex;gap:10px;align-items:center;padding:8px 12px;border-left:3px solid '+(t[3]?"var(--tabt)":"transparent")+'"><span style="font-weight:800;color:var(--daempet);width:22px;font-size:12px">'+(i+1)+'.</span><div style="flex:1"><div style="font-size:12.5px;font-weight:600">'+esc(t[0])+'</div><div style="font-size:10.5px;color:'+(t[3]?"var(--tabt)":"var(--daempet)")+'">'+(t[3]?"⏳ udløber ":"Udløber ")+esc(t[2])+'</div></div><span style="font-weight:800;font-size:13.5px;color:var(--guld)">'+t[1]+'</span></div>'; }).join("");
    h += '<h2 style="font-size:15px;color:var(--is);margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px">Indsigter</h2>' + INDSIGTER.map(function(x){ return '<div class="kort"><p>'+esc(x)+'</p></div>'; }).join("");
  }
  if (S.tab === "strategi") {
    h += '<p class="lille">Seks principper fra DTF\'s pointregler — fundamentet under sæsonplanen.</p>' + STRATEGI.map(function(r){ return '<div class="kort"><h3>'+r[0]+' '+esc(r[1])+'</h3><p>'+esc(r[2])+'</p></div>'; }).join("") +
         '<p class="lille">Point-scenarier ("hvad flytter en G-kvartfinale?") regnes i chatten med Claude.</p>';
  }
  if (S.tab === "plan") {
    h += '<p class="lille">✅ TILMELDT = bekræftet · ★ = hovedprioritet · 🚨 = klippe-dækning, skal spilles.</p>' + PLAN.map(function(u){
      var farve = u[2].indexOf("TILMELDT")>=0 ? "var(--vundet)" : u[2].indexOf("SKAL")>=0 ? "var(--tabt)" : u[2].indexOf("★")>=0 ? "var(--guld)" : "var(--kant)";
      return '<div class="kort" style="border-left:3px solid '+farve+'"><div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap"><b style="font-size:12.5px">'+esc(u[0])+'</b><span style="font-size:11px;font-weight:700;color:'+farve+'">'+esc(u[2])+'</span></div><div style="font-size:12.5px;font-weight:600;margin:2px 0">'+esc(u[1])+'</div><p style="font-size:11.5px">'+esc(u[3])+'</p></div>'; }).join("");
  }
  if (S.tab === "regler") {
    h += REGLER.map(function(r){ return '<div style="display:flex;gap:8px;margin-bottom:9px;font-size:12.5px;line-height:1.6;color:#B9C6D2"><span style="color:var(--gruslys);font-weight:800">§</span><span>'+esc(r)+'</span></div>'; }).join("") +
         '<a href="https://tennis.dk/spiller/ranglister/" target="_blank" rel="noopener noreferrer" style="display:block;text-align:center;background:var(--grus);color:var(--kridt);font-weight:700;font-size:13px;border-radius:8px;padding:12px 0;text-decoration:none;margin-top:12px">📊 Oskars aktuelle rangliste hos DTF</a>';
  }

  h += '<p class="fod">Data gemmes lokalt i browseren på denne enhed. Analyser og opdateringer: send eksporten til Claude via Nicolai. Version 2 · 11. jul 2026. Virker den ikke: åbn filen i Safari/Chrome (ikke i forhåndsvisning).</p>';
  el.innerHTML = h;
}

document.getElementById("app").addEventListener("click", (e) => {
  const b = e.target.closest("[data-a]");
  if (b) A[b.dataset.a](b.dataset.v);
});
document.getElementById("app").addEventListener("input", (e) => {
  const f = e.target.dataset.felt;
  if (f) S[f] = e.target.value;
});
render();
</script>
</body>
</html>
